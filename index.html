<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mohammad's Macro Playbook</title>
<link rel="icon" href="favicon.ico" />
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f2430;
    --border: #2a2f3d;
    --text: #e6e8ee;
    --muted: #9aa3b2;
    --accent: #6ea8fe;
    --accent-2: #7ee2b8;
    --danger: #f07178;
    --warn: #ffcb6b;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select {
    font-family: inherit; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  .btn {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; font-size: 13px;
  }
  .btn:hover { background: #2a3040; }
  .btn.primary { background: var(--accent); color: #0f1115; border-color: transparent; font-weight: 600; }
  .btn.danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn.sm { padding: 3px 8px; font-size: 11px; }

  /* Top Bar */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { font-weight: 700; font-size: 15px; margin-right: auto; }
  .brand .who { color: var(--accent); }
  .lang-toggle {
    display: inline-flex; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px;
  }
  .lang-toggle button {
    background: transparent; color: var(--muted); border: none;
    padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .lang-toggle button.active { background: var(--accent); color: #0f1115; }
  .search { flex: 0 1 300px; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 340px 1fr 360px; height: calc(100vh - 53px); }
  .col { overflow-y: auto; padding: 14px; }
  .col.tree { border-right: 1px solid var(--border); background: var(--panel); }
  .col.center { background: var(--bg); }
  .col.side { border-left: 1px solid var(--border); background: var(--panel); }

  .col h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 6px 0 10px;
  }

  /* Tree */
  .node { margin: 2px 0; }
  .node-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-radius: 6px; cursor: pointer;
    border: 1px solid transparent;
  }
  .node-row:hover { background: var(--panel-2); }
  .node-row.active { background: var(--panel-2); border-color: var(--accent); }
  .node-row .caret { width: 14px; color: var(--muted); font-size: 10px; user-select: none; }
  .node-row .icon { width: 16px; text-align: center; color: var(--muted); }
  .node-row .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node-row .fav { color: var(--warn); }
  .node-row .actions { display: none; gap: 2px; }
  .node-row:hover .actions { display: inline-flex; }
  .node-row .actions button {
    background: transparent; border: none; color: var(--muted);
    padding: 2px 5px; border-radius: 4px; font-size: 12px;
  }
  .node-row .actions button:hover { background: #2a3040; color: var(--text); }

  /* Depth styling */
  .node[data-type="title"] > .node-row > .label { font-weight: 600; }
  .node[data-depth="0"] > .node-row > .label { font-size: 14px; }
  .node[data-depth="1"] > .node-row > .label { font-size: 13px; opacity: 0.95; }
  .node[data-depth="2"] > .node-row > .label { font-size: 12.5px; opacity: 0.85; }
  .node[data-depth="3"] > .node-row > .label { font-size: 12px; opacity: 0.75; }
  .node[data-depth="4"] > .node-row > .label,
  .node[data-depth="5"] > .node-row > .label { font-size: 11.5px; opacity: 0.65; }
  .node[data-type="macro"] > .node-row > .icon { color: var(--accent-2); }
  .node-row .color-dot {
    width: 9px; height: 9px; border-radius: 50%; flex: none;
    border: 1px solid rgba(255,255,255,0.25); cursor: pointer;
  }
  .node-row .color-dot.none { background: transparent; border: 1px dashed var(--border); }

  .children { margin-left: 15px; border-left: 1px dashed var(--border); padding-left: 6px; }
  .children.collapsed { display: none; }

  .node-row .caret.has-children { cursor: pointer; }
  .node-row .actions button[data-act="pin"].pinned { color: var(--warn); }

  /* Color picker popover */
  .color-popover {
    position: fixed; z-index: 300; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; display: flex; gap: 6px; flex-wrap: wrap; width: 132px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .color-popover .swatch {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
  }
  .color-popover .swatch:hover { border-color: var(--text); }
  .color-popover .swatch.none { background: var(--panel-2); border: 1px dashed var(--muted); position: relative; }
  .color-popover .swatch.none::after { content: "✕"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; color: var(--muted); }

  /* Search results */
  .search-results .result-item {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px; cursor: pointer;
  }
  .search-results .result-item:hover { border-color: var(--accent); }
  .search-results .result-path { color: var(--muted); font-size: 10.5px; margin-bottom: 3px; }
  .search-results .result-label { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .search-results .result-snippet { color: var(--muted); font-size: 12px; margin-top: 4px; line-height: 1.4; }
  .search-results .result-snippet mark { background: rgba(255,203,107,0.35); color: var(--text); border-radius: 2px; padding: 0 1px; }
  .search-results .no-results { color: var(--muted); font-size: 12px; padding: 10px 4px; }

  /* Center panel - macro editor */
  .empty-state { color: var(--muted); text-align: center; padding: 60px 20px; }
  .macro-view h2 { margin: 0 0 4px; font-size: 18px; }
  .breadcrumb { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .macro-editor {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; min-height: 200px; line-height: 1.6; white-space: pre-wrap;
    font-size: 14px; outline: none;
  }
  .macro-editor:focus { border-color: var(--accent); }
  .macro-editor.flash { animation: flash 0.6s ease; }
  @keyframes flash { 0%,100% { border-color: var(--border); } 50% { border-color: var(--warn); box-shadow: 0 0 0 3px rgba(255,203,107,0.2); } }

  .placeholder-chip {
    display: inline-block;
    background: rgba(255, 203, 107, 0.18);
    border: 1px solid var(--warn);
    color: var(--text);
    border-radius: 4px;
    padding: 0 4px;
    margin: 0 1px;
    min-width: 64px;
    outline: none;
    font-style: normal;
  }
  /* Shaded, transparent-looking hint text shown only while the chip is empty */
  .placeholder-chip:empty::before {
    content: attr(data-label);
    color: var(--muted);
    opacity: 0.65;
    font-style: italic;
    pointer-events: none;
  }
  .placeholder-chip.filled {
    background: rgba(126, 226, 184, 0.15);
    border-color: var(--accent-2);
    color: var(--text);
    font-style: normal;
  }
  .placeholder-chip:focus { box-shadow: 0 0 0 2px rgba(110, 168, 254, 0.4); }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .tone-btn { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); padding: 5px 10px; border-radius: 999px; font-size: 12px; }
  .tone-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Right column */
  .card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; margin-bottom: 12px;
  }
  .card h4 { margin: 0 0 8px; font-size: 13px; }
  .suggestion {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; margin-top: 8px; font-size: 13px; line-height: 1.5;
  }
  .suggestion .path { color: var(--muted); font-size: 11px; margin-bottom: 6px; }
  .suggestion .actions { display: flex; gap: 6px; margin-top: 8px; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; max-width: 560px; width: 92%; max-height: 88vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 12px; }
  .modal .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .modal .row label { font-size: 12px; color: var(--muted); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .modal.modal-lg { max-width: 720px; }

  /* Customer badge selector (internal-only classification, not shown to customer) */
  .cust-badge-row { display: flex; gap: 8px; margin: 4px 0 12px; flex-wrap: wrap; }
  .cust-badge-btn {
    padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--muted); font-size: 12px; cursor: pointer;
  }
  .cust-badge-btn.active { border-color: var(--accent); color: var(--text); background: rgba(110,168,254,0.15); }

  /* AI Assistant chat */
  .assistant-log {
    height: 320px; overflow-y: auto; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;
  }
  .chat-msg { display: flex; flex-direction: column; max-width: 85%; }
  .chat-msg.user { align-self: flex-end; align-items: flex-end; }
  .chat-msg.assistant { align-self: flex-start; align-items: flex-start; }
  .chat-bubble { padding: 8px 11px; border-radius: 10px; font-size: 13px; line-height: 1.45; white-space: pre-wrap; }
  .chat-msg.user .chat-bubble { background: rgba(110,168,254,0.18); border: 1px solid var(--accent); }
  .chat-msg.assistant .chat-bubble { background: var(--panel); border: 1px solid var(--border); }
  .chat-msg .btn.sm.ghost { margin-top: 3px; padding: 2px 6px; font-size: 11px; }
  .assistant-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .assistant-input-row textarea { flex: 1; resize: vertical; }

  /* Contact reason / log / hashtag packet */
  .packet-field {
    display: flex; align-items: flex-start; gap: 8px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px;
  }
  .packet-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .packet-field .packet-value { font-size: 13px; flex: 1; white-space: pre-wrap; }

  /* AI Backend settings */
  .backend-choice label { display: block; font-size: 13px; margin: 4px 0; cursor: pointer; }
  #local-model-controls label { font-size: 12px; color: var(--muted); cursor: pointer; }

  /* Analytics */
  .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
  .stat-row:last-child { border: none; }
  .stat-row .count { color: var(--accent); font-weight: 600; }

  [dir="rtl"] .col.tree { border-right: none; border-left: 1px solid var(--border); }
  [dir="rtl"] .col.side { border-left: none; border-right: 1px solid var(--border); }
  [dir="rtl"] .children { margin-left: 0; margin-right: 15px; border-left: none; border-right: 1px dashed var(--border); padding-left: 0; padding-right: 6px; }

  .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--accent); color: var(--text);
    padding: 10px 18px; border-radius: 8px; z-index: 200; font-size: 13px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Mohammad<span class="who">'s</span> Macro Playbook</div>
  <input class="search" id="search" placeholder="Search macros..." />
  <div class="lang-toggle" id="lang-toggle">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="ar">AR</button>
  </div>
  <button class="btn" onclick="openPolicyModal()">🧠 Ingest Policy</button>
  <button class="btn" onclick="openAiAssistant()">🤖 AI Assistant</button>
  <button class="btn" onclick="openSettings()">⚙️ Settings</button>
</div>

<div class="layout">
  <div class="col tree">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h3 style="margin:0">Playbook Tree</h3>
      <button class="btn sm primary" onclick="addRootNode()">+ New</button>
    </div>
    <div id="tree"></div>
  </div>

  <div class="col center" id="center">
    <div class="empty-state">
      <p>Select a macro from the tree to view or edit.</p>
      <p style="font-size:12px">Tip: You can add a <b>child</b> to <em>any</em> node — titles or macros — for infinite nesting.</p>
    </div>
  </div>

  <div class="col side">
    <div class="card">
      <h4>🤖 AI Scan — Match Customer Message</h4>
      <textarea id="ai-scan-input" rows="4" style="width:100%" placeholder="Paste customer message here..."></textarea>
      <div class="toolbar">
        <button class="btn primary" onclick="aiScanMatches()">Find Best Match</button>
        <button class="btn" onclick="aiDraftReply()">Draft Reply</button>
      </div>
      <div id="ai-scan-results"></div>
    </div>

    <div class="card">
      <h4>⭐ Favorites</h4>
      <div id="favorites-list"></div>
    </div>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
/* NOTE ON SECURITY: this key is hardcoded into a static, client-side page at
   Mohammad's explicit request. Anyone who opens this page's source or dev tools
   can read and reuse this key against Google Cloud project 1069082963444
   ("Mohammad's Macro-Playbook"). Google's own docs explicitly advise against
   embedding any Gemini key (standard or auth) in client-side code for exactly
   this reason. If this page is ever hosted publicly, rotate this key and set
   a billing alert / IP restriction on it in Google Cloud Console. */
const GEMINI_MODEL = "gemini-3.5-flash"; // gemini-2.0-flash-exp was shut down June 1, 2026 — this is Google's current GA replacement
const STORAGE_KEY = "mohammad-macro-playbook-v2";
// The Gemini key is stored under its OWN localStorage key, deliberately separate
// from `state`. This matters for two reasons:
// 1. It's entered via Settings and never written into index.html / the repo, so it
//    can't leak through git or GitHub's public secret scanning.
// 2. It's excluded from backupJSON()/restoreJSON() (those only touch `state`), so
//    sharing or syncing a backup file never leaks the key either.
const API_KEY_STORAGE = "mohammad-macro-playbook-gemini-key";
let GEMINI_API_KEY = localStorage.getItem(API_KEY_STORAGE) || "";
const COLOR_PALETTE = ["#f07178", "#ffcb6b", "#7ee2b8", "#6ea8fe", "#c792ea", "#89ddff", "#ff8a65", "#9aa3b2"];

// --- Local WebLLM engine state (not persisted — reloaded fresh each session) ---
let localEngine = null;
let localEngineModelId = null;
const LOCAL_MODELS = {
  "1.5b": "Qwen2.5-1.5B-Instruct-q4f16_1-MLC",
  "7b": "Qwen2.5-7B-Instruct-q4f16_1-MLC"
};

// --- Internal-only customer badge, session-only by design (see README): every
// fresh interaction defaults back to "grey" since most customers are unclassified.
// NEVER surface this to the customer — it only steers internal AI tone/policy choice.
let currentBadge = "grey";

/* ============================================================
   STATE
   ============================================================ */
let state = loadState();
// Session-only "which folders are currently expanded" tracker. Not persisted:
// every fresh page load starts fully collapsed except for pinned folders.
// Toggling a folder open/closed during a session updates this set; it resets
// on refresh, per the requested behavior.
let sessionExpanded = new Set(state.pinnedFolders || []);

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.pinnedFolders) parsed.pinnedFolders = [];
      if (!parsed.policies) parsed.policies = [];
      if (!parsed.aiBackend) parsed.aiBackend = "gemini";
      if (!parsed.localModelSize) parsed.localModelSize = "1.5b";
      return parsed;
    }
  } catch (e) {}
  return defaultState();
}

function defaultState() {
  const uid = () => Math.random().toString(36).slice(2, 10);
  const enGreetId = uid();
  const arGreetId = uid();
  return {
    lang: "en",
    activeId: null,
    policy: "",
    // Permanent database of raw ingested policy texts, used to ground every AI
    // feature (chat, drafting, contact-reason/log/hashtag generation). Separate
    // from the generated macro tree — this is the source text itself.
    policies: [],
    // Which AI backend powers all AI features. "gemini" = cloud (needs a key +
    // internet). "local" = WebLLM running fully in this browser via WebGPU (needs
    // no key, works offline, but needs the model downloaded once and capable
    // hardware — see Settings → AI Backend).
    aiBackend: "gemini",
    localModelSize: "1.5b",
    favorites: [],
    usage: {},
    // Folder ids the user has explicitly pinned open; they stay expanded across reloads.
    // Everything else initializes collapsed on each page load (session-only expand state
    // is tracked separately in `sessionExpanded`, not persisted).
    pinnedFolders: [],
    trees: {
      en: [
        { id: uid(), type: "title", label: "Greetings", color: null, children: [
          { id: enGreetId, type: "macro", label: "Welcome message", color: null, text: "Hi [Customer Name], thank you for reaching out! How can I help you today?", children: [] }
        ]},
        { id: uid(), type: "title", label: "Refunds", color: null, children: [] }
      ],
      ar: [
        { id: uid(), type: "title", label: "التحيات", color: null, children: [
          { id: arGreetId, type: "macro", label: "رسالة ترحيب", color: null, text: "مرحباً [اسم العميل]، شكراً لتواصلك معنا! كيف يمكنني مساعدتك اليوم؟", children: [] }
        ]},
        { id: uid(), type: "title", label: "المبالغ المستردة", color: null, children: [] }
      ]
    },
    // Map English node id -> Arabic mirror node id (for sync)
    mirror: { [enGreetId]: arGreetId }
  };
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
const uid = () => Math.random().toString(36).slice(2, 10);

/* ============================================================
   TREE HELPERS
   ============================================================ */
function currentTree() { return state.trees[state.lang]; }

function findNode(id, tree = currentTree(), parent = null, path = []) {
  for (const n of tree) {
    if (n.id === id) return { node: n, parent, siblings: tree, path };
    const found = findNode(id, n.children || [], n, [...path, n]);
    if (found) return found;
  }
  return null;
}

function findNodeInLang(id, lang) {
  return findNode(id, state.trees[lang]);
}

function removeNode(id) {
  const f = findNode(id);
  if (!f) return;
  const idx = f.siblings.indexOf(f.node);
  f.siblings.splice(idx, 1);
  // Remove mirror
  const mirrorId = getMirrorId(id);
  if (mirrorId) {
    const otherLang = state.lang === "en" ? "ar" : "en";
    const mf = findNodeInLang(mirrorId, otherLang);
    if (mf) mf.siblings.splice(mf.siblings.indexOf(mf.node), 1);
    deleteMirror(id);
  }
  if (state.activeId === id) state.activeId = null;
}

function getMirrorId(id) {
  if (state.mirror[id]) return state.mirror[id];
  for (const [k, v] of Object.entries(state.mirror)) if (v === id) return k;
  return null;
}
function setMirror(enId, arId) { state.mirror[enId] = arId; }
function deleteMirror(id) {
  delete state.mirror[id];
  for (const [k, v] of Object.entries(state.mirror)) if (v === id) delete state.mirror[k];
}

/* ============================================================
   RENDERING
   ============================================================ */
function render() {
  document.documentElement.dir = state.lang === "ar" ? "rtl" : "ltr";
  document.querySelectorAll("#lang-toggle button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === state.lang);
  });
  renderTree();
  renderCenter();
  renderFavorites();
  save();
}

function renderTree() {
  const container = document.getElementById("tree");
  const query = document.getElementById("search").value.trim().toLowerCase();
  container.innerHTML = "";
  if (query) {
    container.appendChild(renderSearchResults(query));
    return;
  }
  currentTree().forEach(n => container.appendChild(renderNode(n, 0)));
}

function nodeMatches(n, q) {
  if (!q) return true;
  if (n.label.toLowerCase().includes(q)) return true;
  if (n.text && n.text.toLowerCase().includes(q)) return true;
  return (n.children || []).some(c => nodeMatches(c, q));
}

/* ============================================================
   SMART SEARCH — flat results with folder path + highlighted snippet
   ============================================================ */
function renderSearchResults(query) {
  const box = document.createElement("div");
  box.className = "search-results";
  const results = [];
  const walk = (nodes, path) => nodes.forEach(n => {
    const labelHit = n.label.toLowerCase().includes(query);
    const textHit = !!(n.text && n.text.toLowerCase().includes(query));
    if (labelHit || textHit) results.push({ node: n, path, labelHit, textHit });
    walk(n.children || [], [...path, n.label]);
  });
  walk(currentTree(), []);

  if (!results.length) {
    box.innerHTML = `<div class="no-results">No matches for "${escapeHtml(query)}".</div>`;
    return box;
  }

  results.forEach(r => {
    const item = document.createElement("div");
    item.className = "result-item";
    const icon = r.node.type === "title" ? "📁" : "📝";
    const dot = r.node.color ? `<span class="color-dot" style="background:${r.node.color}"></span>` : "";
    const pathStr = r.path.length ? r.path.join(" › ") : (r.node.type === "title" ? "Top level" : "");
    let snippetHtml = "";
    if (r.textHit) {
      snippetHtml = `<div class="result-snippet">${highlightSnippet(r.node.text, query)}</div>`;
    }
    item.innerHTML = `
      <div class="result-path">${escapeHtml(pathStr)}</div>
      <div class="result-label">${dot}${icon} ${escapeHtml(r.node.label)}</div>
      ${snippetHtml}
    `;
    item.addEventListener("click", () => {
      // Ensure ancestors are expanded so the node is visible once search clears
      let cur = findNode(r.node.id);
      if (cur) cur.path.forEach(p => sessionExpanded.add(p.id));
      state.activeId = r.node.id;
      document.getElementById("search").value = "";
      render();
    });
    box.appendChild(item);
  });
  return box;
}

/* Builds a truncated, highlighted preview snippet centered on the first match */
function highlightSnippet(text, query, radius = 60) {
  const lower = text.toLowerCase();
  const idx = lower.indexOf(query);
  if (idx === -1) return escapeHtml(text.slice(0, 100)) + (text.length > 100 ? "…" : "");
  const start = Math.max(0, idx - radius);
  const end = Math.min(text.length, idx + query.length + radius);
  let snippet = text.slice(start, end);
  const prefix = start > 0 ? "…" : "";
  const suffix = end < text.length ? "…" : "";
  // Escape first, then wrap the (still plain-text) match in <mark>
  const before = escapeHtml(snippet.slice(0, idx - start));
  const match = escapeHtml(snippet.slice(idx - start, idx - start + query.length));
  const after = escapeHtml(snippet.slice(idx - start + query.length));
  return prefix + before + `<mark>${match}</mark>` + after + suffix;
}

function renderNode(node, depth) {
  const wrap = document.createElement("div");
  wrap.className = "node";
  wrap.dataset.type = node.type;
  wrap.dataset.depth = depth;

  const hasChildren = !!(node.children && node.children.length);
  const isTitle = node.type === "title";
  const isPinned = state.pinnedFolders.includes(node.id);
  // Folders default collapsed each load; stay expanded during the session once opened,
  // unless pinned open (which persists across reloads too).
  const isExpanded = !hasChildren || !isTitle || sessionExpanded.has(node.id);

  const row = document.createElement("div");
  row.className = "node-row" + (state.activeId === node.id ? " active" : "");
  const isFav = state.favorites.includes(node.id);
  const icon = node.type === "title" ? "📁" : "📝";
  const caret = hasChildren ? (isExpanded ? "▾" : "▸") : "";
  const dotStyle = node.color ? `style="background:${node.color}"` : "";
  row.innerHTML = `
    <span class="caret${hasChildren ? " has-children" : ""}">${caret}</span>
    <span class="color-dot${node.color ? "" : " none"}" ${dotStyle} title="Set color" data-act="color"></span>
    <span class="icon">${icon}</span>
    <span class="label">${escapeHtml(node.label)}</span>
    ${isFav ? '<span class="fav">★</span>' : ''}
    <span class="actions">
      <button title="Add child" data-act="add">+</button>
      ${isTitle ? `<button title="${isPinned ? 'Unpin (auto-collapse on reload)' : 'Pin open (stay expanded on reload)'}" data-act="pin" class="${isPinned ? 'pinned' : ''}">📌</button>` : ''}
      <button title="Favorite" data-act="fav">★</button>
      <button title="Rename" data-act="edit">✎</button>
      <button title="Delete" data-act="del">🗑</button>
    </span>
  `;
  row.addEventListener("click", (e) => {
    const act = e.target.dataset.act;
    if (act === "add") { e.stopPropagation(); addChildTo(node.id); return; }
    if (act === "fav") { e.stopPropagation(); toggleFav(node.id); return; }
    if (act === "edit") { e.stopPropagation(); renameNode(node.id); return; }
    if (act === "pin") { e.stopPropagation(); toggleFolderPin(node.id); return; }
    if (act === "color") { e.stopPropagation(); openColorPopover(e.target, node.id); return; }
    if (act === "del") { e.stopPropagation(); if (confirm(`Delete "${node.label}"?`)) { removeNode(node.id); render(); } return; }
    if (hasChildren && isTitle && e.target.closest(".label, .caret, .icon")) {
      toggleFolderExpanded(node.id);
      return;
    }
    state.activeId = node.id;
    render();
  });
  wrap.appendChild(row);

  if (hasChildren) {
    const kids = document.createElement("div");
    kids.className = "children" + (isExpanded ? "" : " collapsed");
    node.children.forEach(c => kids.appendChild(renderNode(c, depth + 1)));
    wrap.appendChild(kids);
  }
  return wrap;
}

function toggleFolderExpanded(id) {
  if (sessionExpanded.has(id)) sessionExpanded.delete(id);
  else sessionExpanded.add(id);
  renderTree();
}

function toggleFolderPin(id) {
  const i = state.pinnedFolders.indexOf(id);
  if (i >= 0) { state.pinnedFolders.splice(i, 1); }
  else { state.pinnedFolders.push(id); sessionExpanded.add(id); }
  save();
  renderTree();
}

/* Renders macro text as HTML with editable, initially-empty placeholder chips.
   Each chip shows a shaded/transparent hint (the placeholder name) via CSS
   until the user types into it. */
function renderMacroEditor(el, text) {
  el.innerHTML = "";
  const parts = text.split(/(\[[^\]]+\])/g);
  parts.forEach(part => {
    if (/^\[[^\]]+\]$/.test(part)) {
      const chip = document.createElement("span");
      chip.className = "placeholder-chip";
      chip.contentEditable = "true";
      chip.dataset.placeholder = part;
      chip.dataset.label = part.slice(1, -1);
      chip.textContent = ""; // start completely empty — no bracket text to delete
      chip.addEventListener("input", () => {
        chip.classList.toggle("filled", chip.textContent.trim().length > 0);
      });
      el.appendChild(chip);
    } else if (part) {
      el.appendChild(document.createTextNode(part));
    }
  });
}

function serializeEditor(el) {
  // WYSIWYG serialize: whatever is visible in the editor is what gets copied.
  // A chip that's still empty falls back to its original [Bracket Placeholder]
  // text so the copied output makes clear it wasn't filled in.
  let out = "";
  el.childNodes.forEach(n => {
    if (n.nodeType === Node.TEXT_NODE) out += n.textContent;
    else if (n.classList && n.classList.contains("placeholder-chip")) {
      const typed = n.textContent.trim();
      out += typed ? n.textContent : n.dataset.placeholder;
    } else if (n.nodeType === Node.ELEMENT_NODE) {
      out += n.textContent;
    }
  });
  return out;
}

/* Clears every chip back to its empty, shaded-placeholder baseline. */
function resetEditorChips(el) {
  el.querySelectorAll(".placeholder-chip").forEach(chip => {
    chip.textContent = "";
    chip.classList.remove("filled");
  });
}

}

function copyMacro() {
  const editor = document.getElementById("macro-editor");
  if (!editor) return;
  const text = serializeEditor(editor);
  navigator.clipboard.writeText(text);
  state.usage[state.activeId] = (state.usage[state.activeId] || 0) + 1;
  save();
  // The instant it's copied, wipe the fields back to their empty, shaded
  // baseline so the next case starts clean with no leftover customer data.
  resetEditorChips(editor);
  toast("Copied to clipboard — fields reset for next case");
}

async function submitNodeModal(parentId) {
  const type = document.getElementById("nm-type").value;
  const label = document.getElementById("nm-label").value.trim();
  const text = type === "macro" ? document.getElementById("nm-text").value : "";
  const sync = document.getElementById("nm-sync").checked;
  if (!label) { toast("Label required"); return; }

  const newNode = { id: uid(), type, label, text, color: null, children: [] };
  const parent = parentId ? findNode(parentId) : null;
  if (parent) parent.node.children.push(newNode);
  else currentTree().push(newNode);

  // Mirror to other lang
  if (sync) {
    const otherLang = state.lang === "en" ? "ar" : "en";
    let mirrorParentId = null;
    if (parentId) {
      const mp = getMirrorId(parentId);
      if (mp) mirrorParentId = mp;
    }
    const mirrorNode = {
      id: uid(), type,
      label: aiReady() ? (await translateText(label, otherLang)) || label : label,
      text: (type === "macro" && text && aiReady()) ? (await translateText(text, otherLang)) || text : text,
      color: newNode.color,
      children: []
    };
    if (mirrorParentId) {
      const mp = findNodeInLang(mirrorParentId, otherLang);
      if (mp) mp.node.children.push(mirrorNode);
      else state.trees[otherLang].push(mirrorNode);
    } else {
      state.trees[otherLang].push(mirrorNode);
    }
    const enId = state.lang === "en" ? newNode.id : mirrorNode.id;
    const arId = state.lang === "en" ? mirrorNode.id : newNode.id;
    setMirror(enId, arId);
  }

  state.activeId = newNode.id;
  closeModal();
  render();
}

// Adds (or keeps growing) the permanent policy database used to ground AI
// features. This is deliberately separate from the generated macro tree —
// it's the raw source text the AI reasons from, not the polished replies.
function addPolicyRecord(title, text) {
  state.policies.push({
    id: uid(),
    title: (title || "").trim() || ("Policy " + (state.policies.length + 1)),
    text,
    ingestedAt: new Date().toISOString()
  });
  save();
}

function deletePolicy(id) {
  state.policies = state.policies.filter(p => p.id !== id);
  save();
  closeModal();
  openSettings();
}

const POLICY_STOPWORDS = new Set(["the","a","an","is","are","was","were","to","of","and","or","in","on","for","with","this","that","it","be","if","we","our","you","your","i","he","she","they","them","his","her","its","from","as","at","by","not","no","do","does","did","has","have","had","will","would","can","could","should","must","اذا","في","من","الى","على","عن","هذا","هذه","و","او","ان","كان"]);

// Cheap, dependency-free "poor man's RAG": scores saved policies by keyword
// overlap with the query and returns the most relevant few. Returns [] when
// nothing meaningfully matches, so callers fall back to general judgment
// instead of stuffing in irrelevant policy text.
function getRelevantPolicies(query, max = 3) {
  if (!state.policies.length) return [];
  const terms = (query || "").toLowerCase().split(/[^a-z0-9\u0600-\u06FF]+/i).filter(w => w.length > 2 && !POLICY_STOPWORDS.has(w));
  if (!terms.length) return [];
  const scored = state.policies.map(p => {
    const hay = (p.title + " " + p.text).toLowerCase();
    const score = terms.reduce((s, w) => s + (hay.includes(w) ? 1 : 0), 0);
    return { p, score };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score);
  return scored.slice(0, max).map(x => x.p);
}

// Formats the most relevant saved policies (if any) into a text block ready
// to drop into a prompt. Falls back to explicitly telling the AI nothing
// matched, so it reasons from general judgment instead of guessing at policy.
function policyContextFor(query) {
  const rel = getRelevantPolicies(query, 3);
  if (!rel.length) return "(No specific ingested policy matched this — use sound general customer-service judgment.)";
  return rel.map(p => `[Policy: ${p.title}]\n${p.text}`).join("\n\n");
}

function savePolicyOnly() {
  const text = document.getElementById("policy-text").value;
  const title = document.getElementById("policy-title").value;
  state.policy = text;
  if (text.trim()) addPolicyRecord(title, text.trim());
  save(); closeModal(); toast("Policy saved");
}

async function ingestPolicy() {
  const text = document.getElementById("policy-text").value.trim();
  const title = document.getElementById("policy-title").value;
  if (!text) return;
  state.policy = text;
  addPolicyRecord(title, text);
  if (!aiReady()) { aiNotReadyToast(); save(); closeModal(); return; }
  toast("AI generating tree...");
  const prompt = `You are a customer service knowledge architect. Parse the following company policy into a LOGICALLY NESTED hierarchy of folders (titles) and macros — do not flatten everything into one level. Group related scenarios under a shared parent title, and add a sub-title when a topic has multiple genuinely distinct sub-cases (e.g. "Late Delivery" branching into "20-45 minutes late" and "45+ minutes late" as separate macros or even separate sub-titles if each has several scenarios of its own). Only go as deep as the content actually warrants — a single flat macro is fine when there's no real sub-case. Return STRICT JSON only, no prose, no markdown fences. Schema:
{"tree":[{"type":"title","label":"...","children":[{"type":"macro","label":"...","text":"..."},{"type":"title","label":"...","children":[...]}]}]}
Macro "text" should be a ready-to-send customer response — professional, warm, and firm where the policy requires holding a line, never generic or robotic-sounding. Use [brackets] for dynamic placeholders. Titles group related macros/sub-titles.

POLICY:
${text}`;
  const result = await aiGenerate(prompt);
  try {
    const cleaned = result.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(cleaned);
    const enNodes = normalizeTree(parsed.tree || []);
    state.trees.en.push(...enNodes);
    // Translate to Arabic
    const arNodes = await deepTranslateTree(enNodes, "ar");
    state.trees.ar.push(...arNodes);
    linkMirrors(enNodes, arNodes);
    save(); closeModal(); render(); toast("Policy ingested & translated");
  } catch (e) {
    console.error(e, result);
    toast("AI returned invalid JSON. Policy saved as text.");
    save(); closeModal();
  }
}

function normalizeTree(nodes) {
  return nodes.map(n => ({
    id: uid(),
    type: n.type === "title" ? "title" : "macro",
    label: n.label || "Untitled",
    text: n.text || "",
    color: null,
    children: normalizeTree(n.children || [])
  }));
}

async function deepTranslateTree(nodes, targetLang) {
  const out = [];
  for (const n of nodes) {
    out.push({
      id: uid(),
      type: n.type,
      label: (await translateText(n.label, targetLang)) || n.label,
      text: n.text ? ((await translateText(n.text, targetLang)) || n.text) : "",
      color: n.color || null,
      children: await deepTranslateTree(n.children || [], targetLang)
    });
  }
  return out;
}

function linkMirrors(en, ar) {
  for (let i = 0; i < en.length && i < ar.length; i++) {
    setMirror(en[i].id, ar[i].id);
    linkMirrors(en[i].children || [], ar[i].children || []);
  }
}

/* ============================================================
   SHARED PERSONA / TONE / BADGE CONTEXT
   Reused by AI Scan draft reply, the AI Assistant chat, and contact-packet
   generation, so tone and badge-awareness stay consistent everywhere.
   ============================================================ */
const PERSONA_INSTRUCTIONS = `You are a professional customer service representative for a food delivery platform. Tone: warm and human, never robotic or generic — friendly by default, and firm (while staying respectful) when policy requires holding a line. When writing in Arabic, use natural, professional Modern Standard Arabic the way a well-trained bilingual support agent actually writes it — not a stiff literal translation, not overly classical/formal, and not casual slang. Match whichever language the customer used. Company policy (given below, if any) is the highest-priority source of truth; if nothing relevant was found, use sound customer-service judgment instead of inventing a policy.`;

function badgeNoteFor(badge) {
  return {
    grey: "Customer badge (internal only, NEVER mention to the customer): GREY — default/unclassified. Apply standard policy and standard tone.",
    red: "Customer badge (internal only, NEVER mention to the customer): RED — flagged internally for a history of abuse or bad-faith complaints. Apply policy strictly and minimally; do not offer discretionary goodwill beyond what policy requires. Stay professional and firm, not cold.",
    gold: "Customer badge (internal only, NEVER mention to the customer): GOLD — flagged internally as a valuable, low-complaint customer. Lean toward the more generous end of what policy allows, and prioritize retention and warmth."
  }[badge] || "";
}

/* ============================================================
   AI SCAN / MATCHING
   ============================================================ */
async function aiScanMatches() {
  const msg = document.getElementById("ai-scan-input").value.trim();
  const box = document.getElementById("ai-scan-results");
  if (!msg) return;
  if (!aiReady()) {
    // Fallback keyword match
    const all = flattenMacros();
    const kw = msg.toLowerCase().split(/\s+/);
    const scored = all.map(m => ({
      m, score: kw.reduce((s, w) => s + ((m.node.label + " " + m.node.text).toLowerCase().includes(w) ? 1 : 0), 0)
    })).filter(x => x.score > 0).sort((a,b) => b.score - a.score).slice(0, 3);
    box.innerHTML = scored.length ? scored.map(x => suggestionHtml(x.m)).join('') : '<p style="color:var(--muted); font-size:12px; margin-top:8px">No matches (set up an AI backend in ⚙️ Settings for smarter matching).</p>';
    return;
  }
  box.innerHTML = '<p style="color:var(--muted); font-size:12px">Scanning...</p>';
  const macros = flattenMacros();
  const list = macros.map((m, i) => `${i}: [${m.path.join(' › ')}] ${m.node.label} — ${m.node.text.slice(0,80)}`).join('\n');
  const prompt = `Relevant policy:\n${policyContextFor(msg)}\n\nAvailable macros:\n${list}\n\nCustomer message: "${msg}"\n\nReturn the 3 best macro indices as JSON array of numbers only, e.g. [0,3,7]`;
  const result = await aiGenerate(prompt);
  try {
    const idxs = JSON.parse(result.replace(/```json|```/g, '').trim());
    const picks = idxs.map(i => macros[i]).filter(Boolean);
    box.innerHTML = picks.map(m => suggestionHtml(m)).join('') || '<p style="color:var(--muted); font-size:12px">No matches.</p>';
  } catch (e) {
    box.innerHTML = '<p style="color:var(--danger); font-size:12px">AI parse error.</p>';
  }
}

async function aiDraftReply() {
  const msg = document.getElementById("ai-scan-input").value.trim();
  const box = document.getElementById("ai-scan-results");
  if (!msg) return;
  if (!aiReady()) { aiNotReadyToast(); return; }
  box.innerHTML = '<p style="color:var(--muted); font-size:12px">Drafting...</p>';
  const macros = flattenMacros().map(m => `${m.node.label}: ${m.node.text}`).join('\n');
  const prompt = `${PERSONA_INSTRUCTIONS}\n\n${badgeNoteFor(currentBadge)}\n\nRelevant policy:\n${policyContextFor(msg)}\n\nExisting macro tone reference (for style only, don't just copy one verbatim):\n${macros}\n\nCustomer message: "${msg}"\n\nWrite ONE best reply in the same language as the customer message. Use [brackets] for placeholders. Return only the reply text, no commentary.`;
  const reply = await aiGenerate(prompt);
  const safe = escapeHtml(reply || '').replace(/\n/g, '<br>');
  box.innerHTML = `
    <div class="suggestion">
      <div class="path">AI Drafted Reply</div>
      <div>${safe}</div>
      <div class="actions">
        <button class="btn sm" onclick="navigator.clipboard.writeText(${JSON.stringify(reply || '')}); toast('Copied')">📋 Copy</button>
        <button class="btn sm primary" onclick='saveAiReplyToMacros(${JSON.stringify(reply || '')})'>+ Add to Macros</button>
      </div>
    </div>
  `;
}

function saveAiReplyToMacros(text) {
  openNodeModal({ parentId: null, forcedType: "macro", prefillText: text, prefillLabel: "" });
}

function flattenMacros(lang = state.lang) {
  const out = [];
  const walk = (nodes, path) => nodes.forEach(n => {
    if (n.type === "macro") out.push({ node: n, path });
    walk(n.children || [], [...path, n.label]);
  });
  walk(state.trees[lang], []);
  return out;
}

function suggestionHtml(m) {
  return `<div class="suggestion" onclick="state.activeId='${m.node.id}'; render();" style="cursor:pointer">
    <div class="path">${escapeHtml(m.path.join(' › '))}</div>
    <b>${escapeHtml(m.node.label)}</b>
    <div style="color:var(--muted); font-size:12px; margin-top:4px">${escapeHtml((m.node.text || '').slice(0, 120))}${(m.node.text||'').length>120?'...':''}</div>
  </div>`;
}

// Conversation history is session-only by design (matches the badge default

let assistantHistory = [];

function setCustomerBadge(b) {

function buildAssistantSystemPrompt(queryForRelevance) {
  return `${PERSONA_INSTRUCTIONS}

${badgeNoteFor(currentBadge)}

Relevant ingested company policy (highest-priority source of truth when it applies):
${policyContextFor(queryForRelevance)}

You're chatting with the support agent (not the customer) inside their internal macro tool. They may paste a customer's message and ask for a reply, ask a general question, or ask you to help reason through a case. If you're missing a detail you'd need to give a confident, correct answer (e.g. "did the customer confirm the item was missing, or just late?"), ask ONE short clarifying question instead of guessing. When you do give a reply meant to be sent to the customer, write it entirely in the customer's language, make it copy-paste ready, and don't wrap it in commentary or labels.`;

function openAiAssistant() {
  const modal = document.createElement("div");
  modal.className = "modal-backdrop";

function renderAssistantChat() {
  const log = document.getElementById("assistant-log");
  if (!log) return;
  log.innerHTML = assistantHistory.map(m => `
    <div class="chat-msg ${m.role}">
      <div class="chat-bubble">${escapeHtml(m.content)}</div>
      ${m.role === "assistant" ? `<button class="btn sm ghost" onclick="navigator.clipboard.writeText(${JSON.stringify(m.content)}); toast('Copied')">📋 Copy</button>` : ""}
    </div>
  `).join("") || `<p style="color:var(--muted); font-size:12px">No messages yet — ask anything or paste a customer message above.</p>`;
  log.scrollTop = log.scrollHeight;
}

async function sendAssistantMessage() {
  const input = document.getElementById("assistant-input");
  const msg = (input.value || "").trim();
  if (!msg) return;
  if (!aiReady()) { aiNotReadyToast(); return; }
  assistantHistory.push({ role: "user", content: msg });
  input.value = "";
  renderAssistantChat();
  const sys = buildAssistantSystemPrompt(msg);
  const messages = [{ role: "system", content: sys }, ...assistantHistory.slice(-12)];
  const reply = await aiChat(messages);
  if (reply) {
    assistantHistory.push({ role: "assistant", content: reply.trim() });
    renderAssistantChat();
  }
}

async function generateContactPacket() {
  const box = document.getElementById("contact-packet-results");
  if (!assistantHistory.length) { toast("Chat about the case first, then generate the packet."); return; }
  if (!aiReady()) { aiNotReadyToast(); return; }
  box.innerHTML = '<p style="color:var(--muted); font-size:12px">Generating...</p>';
  const transcript = assistantHistory.map(m => `${m.role === "user" ? "Agent" : "Assistant"}: ${m.content}`).join("\n");
  const sys = buildAssistantSystemPrompt(transcript);
  const prompt = `${sys}

Based on the conversation below, produce STRICT JSON only (no markdown fences, no prose) with exactly this shape:
{"contactReason":"short 2-6 word phrase, e.g. 'Order marked delivered, not received'","log":"2-4 sentence professional internal log: what happened and how it was resolved, written the way a real support log should read since the customer can request it","hashtag":"#OneWordOrCamelCaseClassificationTag"}

Conversation:
${transcript}`;
  const out = await aiGenerate(prompt);
  try {
    const parsed = JSON.parse((out || "").replace(/```json|```/g, "").trim());
    box.innerHTML = ["contactReason","log","hashtag"].map(key => `
      <div class="packet-field">
        <div style="flex:1">
          <label>${key === "contactReason" ? "Contact Reason" : key === "log" ? "Log" : "Hashtag"}</label>
          <div class="packet-value">${escapeHtml(parsed[key] || "")}</div>
        </div>
        <button class="btn sm" onclick="navigator.clipboard.writeText(${JSON.stringify(parsed[key] || "")}); toast('Copied')">📋</button>
      </div>
    `).join("");
  } catch (e) {
    console.error(e, out);
    box.innerHTML = '<p style="color:var(--danger); font-size:12px">Could not parse the AI output — try again.</p>';
  }
}

function hasApiKey() { return !!GEMINI_API_KEY; }

}
function aiNotReadyToast() {

function setAiBackend(v) {

async function ensureLocalEngine(onProgress) {
  const modelId = LOCAL_MODELS[state.localModelSize] || LOCAL_MODELS["1.5b"];
  if (localEngine && localEngineModelId === modelId) return localEngine;
  const webllm = await import("https://esm.run/@mlc-ai/web-llm");
  localEngine = await webllm.CreateMLCEngine(modelId, {
    initProgressCallback: (p) => onProgress && onProgress(p)
  });
  localEngineModelId = modelId;
  return localEngine;
}

async function loadLocalModel() {
  const statusEl = document.getElementById("local-model-status");
  const progEl = document.getElementById("local-model-progress");
  if (!navigator.gpu) {
    if (statusEl) statusEl.textContent = "Not supported.";
    toast("This browser/device doesn't support WebGPU, so the local model can't run. Try the latest Chrome or Edge on a desktop.");
    return;
  }
  if (statusEl) statusEl.textContent = "Loading — first load downloads the model (can take a while)...";
  try {
    await ensureLocalEngine((p) => { if (progEl) progEl.textContent = p.text || (Math.round((p.progress || 0) * 100) + "%"); });
    if (statusEl) statusEl.textContent = "✓ Loaded: " + localEngineModelId;
    if (progEl) progEl.textContent = "";
    toast("Local AI model ready");
  } catch (e) {
    console.error(e);
    if (statusEl) statusEl.textContent = "Failed to load.";
    toast("Local AI load error: " + (e.message || e));
  }
}

// Serial queue so overlapping AI calls (e.g. tree generation firing many
// translate calls back to back) never run concurrently against either backend.
let aiQueue = Promise.resolve();
function queueAiCall(fn) {
  const run = aiQueue.then(fn, fn);
  aiQueue = run.then(() => {}, () => {});
  return run;
}

// Convenience wrapper for the many call sites that just want text back from a
// single prompt string. Internally normalizes to the messages-based aiChat().
async function aiGenerate(prompt) {
  return aiChat([{ role: "user", content: prompt }]);
}

// Unified entry point: messages = [{role: "system"|"user"|"assistant", content}]
async function aiChat(messages) {
  return queueAiCall(() => state.aiBackend === "local" ? aiChatLocal(messages) : aiChatGemini(messages));
}

let lastGeminiCallAt = 0;
const GEMINI_MIN_GAP_MS = 4500; // keeps well under Gemini free-tier's ~10-15 requests/minute ceiling

async function aiChatGemini(messages) {
  if (!GEMINI_API_KEY) {
    toast("AI error: no Gemini API key set. Add one in ⚙️ Settings → AI (Gemini) Key.");
    return null;
  }
  const waitFor = GEMINI_MIN_GAP_MS - (Date.now() - lastGeminiCallAt);
  if (waitFor > 0) await new Promise(r => setTimeout(r, waitFor));
  lastGeminiCallAt = Date.now();

  const systemParts = messages.filter(m => m.role === "system").map(m => m.content);
  const contents = messages.filter(m => m.role !== "system").map(m => ({
    role: m.role === "assistant" ? "model" : "user",
    parts: [{ text: m.content }]
  }));
  const body = { contents };
  if (systemParts.length) body.systemInstruction = { parts: [{ text: systemParts.join("\n\n") }] };

  let res;
  try {
    // Auth keys (the "AQ." prefix) authenticate via the x-goog-api-key header,
    // not the old "?key=" query param used by legacy AIza standard keys.
    res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-goog-api-key": GEMINI_API_KEY },
      body: JSON.stringify(body)
    });
  } catch (e) {
    console.error(e);
    toast("AI network error: " + (e.message || e) + ". Check your internet connection.");
    return null;
  }
  let data;
  try { data = await res.json(); } catch (e) {
    toast("AI error: invalid response from Gemini (HTTP " + res.status + ").");
    return null;
  }
  if (!res.ok) {
    const msg = data?.error?.message || ("HTTP " + res.status);
    const status = data?.error?.status ? " [" + data.error.status + "]" : "";
    console.error("Gemini API error", data);
    if (res.status === 400 && /API key/i.test(msg)) toast("AI error: invalid API key. Check it in ⚙️ Settings.");
    else if (res.status === 403) toast("AI error: access denied — key lacks permission for " + GEMINI_MODEL + " (" + msg + ")");
    else if (res.status === 404) toast("AI error: model '" + GEMINI_MODEL + "' not found. Update GEMINI_MODEL.");
    else if (res.status === 429) toast("AI error: rate limit / quota exceeded. Waiting a bit longer between requests — try again in a moment.");
    else toast("AI error" + status + ": " + msg);
    return null;
  }
  const candidate = data?.candidates?.[0];
  const finishReason = candidate?.finishReason;
  const text = candidate?.content?.parts?.[0]?.text || "";
  if (!text) {
    if (finishReason === "SAFETY") toast("AI error: response blocked by safety filters.");
    else if (finishReason === "MAX_TOKENS") toast("AI error: response truncated (MAX_TOKENS). Try a shorter prompt.");
    else if (finishReason === "RECITATION") toast("AI error: response blocked (RECITATION).");
    else if (data?.promptFeedback?.blockReason) toast("AI error: prompt blocked — " + data.promptFeedback.blockReason);
    else toast("AI error: empty response" + (finishReason ? " (" + finishReason + ")" : "") + ".");
    console.error("Gemini empty response", data);
    return null;
  }
  if (finishReason === "MAX_TOKENS") toast("Warning: AI response was truncated (MAX_TOKENS).");
  return text;
}

async function aiChatLocal(messages) {
  if (!localEngine) {
    toast("Local AI model not loaded. Go to ⚙️ Settings → AI Backend and click Load Model.");
    return null;
  }
  try {
    const res = await localEngine.chat.completions.create({ messages, temperature: 0.7 });
    return res?.choices?.[0]?.message?.content || "";
  } catch (e) {
    console.error(e);
    toast("Local AI error: " + (e.message || e));
    return null;
  }
}

async function translateText(text, targetLang) {
  if (!text || !aiReady()) return text;
  const instruction = targetLang === "ar"
    ? "Translate the following into natural, professional Modern Standard Arabic, the way a well-trained bilingual customer service agent would actually write it — not a stiff, literal machine translation, and not casual slang."
    : "Translate the following into natural, professional English customer-service writing.";
  const out = await aiGenerate(`${instruction} Preserve [bracket placeholders] EXACTLY as-is, untranslated. Return only the translation, no quotes, no notes:\n\n${text}`);
  return out ? out.trim() : text;
}

/* ============================================================
   UTILS
   ============================================================ */
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.getElementById("toast-root").appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function backupJSON() {
  try {
    const payload = { app: "mohammad-macro-playbook", version: 2, exportedAt: new Date().toISOString(), state };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `macro-playbook-backup-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast("Backup downloaded");
  } catch (e) { console.error(e); toast("Backup failed: " + e.message); }
}

function restoreJSON(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = "";
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const restored = parsed && parsed.state ? parsed.state : parsed;
      if (!restored || !restored.trees) throw new Error("File is not a valid macro-playbook backup");
      if (!confirm("Restore will REPLACE all current data. Continue?")) return;
      Object.assign(state, restored);
      save(); closeModal(); render(); toast("Backup restored");
    } catch (e) { console.error(e); toast("Restore failed: " + e.message); }
  };
  reader.onerror = () => toast("Restore failed: could not read file");
  reader.readAsText(file);
}

/* ============================================================
   EVENTS
   ============================================================ */
document.querySelectorAll("#lang-toggle button").forEach(b => {
  b.addEventListener("click", () => { state.lang = b.dataset.lang; state.activeId = null; render(); });
});
document.getElementById("search").addEventListener("input", renderTree);

render();
