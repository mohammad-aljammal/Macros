<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mohammad's Macro Playbook</title>
<link rel="icon" href="favicon.ico" />
<style>
  :root {
    --bg: #0b0d12; --panel: #141821; --panel-2: #1c2130; --panel-3: #232939;
    --border: #2a2f3d; --border-2: #363c4d;
    --text: #e8ebf2; --muted: #96a0b3; --muted-2: #6b7488;
    --accent: #6ea8fe; --accent-2: #7ee2b8; --accent-3: #c792ea;
    --danger: #f07178; --warn: #ffcb6b; --success: #7ee2b8;
    --radius: 10px; --radius-lg: 14px;
    --shadow-lg: 0 20px 50px rgba(0,0,0,.55);
    --shadow-md: 0 6px 20px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select {
    font-family: inherit; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,168,254,.15); }
  a { color: var(--accent); }

  .btn {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 7px 13px; border-radius: 8px; font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px; transition: all .12s;
  }
  .btn:hover { background: var(--panel-3); border-color: var(--border-2); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.primary { background: linear-gradient(180deg, #7fb3ff, var(--accent)); color: #0b0d12; border-color: transparent; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn.danger:hover { background: rgba(240,113,120,.1); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn.ghost:hover { background: var(--panel-2); color: var(--text); }
  .btn.success { background: linear-gradient(180deg, #8ee9c0, var(--accent-2)); color: #0b0d12; border-color: transparent; font-weight: 600; }
  .btn.sm { padding: 4px 9px; font-size: 11.5px; border-radius: 6px; }
  .btn.icon { padding: 6px 8px; }

  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { font-weight: 700; font-size: 15px; margin-right: auto; letter-spacing: -.01em; }
  .brand .who { color: var(--accent); }
  .lang-toggle {
    display: inline-flex; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px;
  }
  .lang-toggle button {
    background: transparent; color: var(--muted); border: none;
    padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .lang-toggle button.active { background: var(--accent); color: #0b0d12; }

  .party-tabs {
    display: flex; gap: 6px; padding: 8px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border); position: sticky; top: 53px; z-index: 9;
  }
  .party-tab {
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px; transition: all .12s;
  }
  .party-tab:hover { color: var(--text); border-color: var(--border-2); }
  .party-tab.active { background: rgba(110,168,254,.14); border-color: var(--accent); color: var(--text); }
  .party-tab .count { font-size: 10.5px; color: var(--muted); font-weight: 400; }
  .search { flex: 0 1 340px; }

  .layout { display: grid; grid-template-columns: 340px 1fr 380px; height: calc(100vh - 100px); }
  .col { overflow-y: auto; padding: 14px; }
  .col.tree { border-right: 1px solid var(--border); background: var(--panel); }
  .col.center { background: var(--bg); }
  .col.side { border-left: 1px solid var(--border); background: var(--panel); }
  .col h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 6px 0 10px;
  }

  .node { margin: 2px 0; }
  .node-row {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 6px 8px; border-radius: 7px; cursor: pointer;
    border: 1px solid transparent; transition: background .1s, border-color .1s;
  }
  .node-row:hover { background: var(--panel-2); }
  .node-row.active { background: var(--panel-2); border-color: var(--accent); }
  .node-row.kbd-focus { border-color: var(--warn); box-shadow: 0 0 0 1px var(--warn) inset; }
  .node-row.flash-row { animation: rowflash 1.4s ease; }
  @keyframes rowflash {
    0%,100% { background: var(--panel-2); box-shadow: none; }
    30%,60% { background: rgba(126,226,184,.28); box-shadow: 0 0 0 2px var(--accent-2) inset; }
  }
  .node-row.dragging { opacity: .4; }
  .node-row.drop-above { border-top: 2px solid var(--accent); }
  .node-row.drop-below { border-bottom: 2px solid var(--accent); }
  .node-row .caret { width: 14px; color: var(--muted); font-size: 10px; user-select: none; margin-top: 3px; }
  .node-row .icon { width: 16px; text-align: center; color: var(--muted); margin-top: 1px; }
  .node-row .label { flex: 1; white-space: normal; overflow-wrap: anywhere; line-height: 1.35; }
  .node-row .color-dot { margin-top: 4px; }
  .node-row .fav { color: var(--warn); margin-top: 1px; }
  .node-row .shortcut-hint { font-size: 10px; color: var(--muted-2); background: var(--panel-3); padding: 1px 5px; border-radius: 4px; margin-top: 1px; }
  .node-row .actions { display: none; gap: 2px; }
  .node-row:hover .actions { display: inline-flex; }
  .node-row .actions button {
    background: transparent; border: none; color: var(--muted);
    padding: 2px 5px; border-radius: 4px; font-size: 12px;
  }
  .node-row .actions button:hover { background: var(--panel-3); color: var(--text); }

  .node[data-type="title"] > .node-row > .label { font-weight: 600; }
  .node[data-depth="0"] > .node-row > .label { font-size: 14px; }
  .node[data-depth="1"] > .node-row > .label { font-size: 13px; opacity: 0.95; }
  .node[data-depth="2"] > .node-row > .label { font-size: 12.5px; opacity: 0.85; }
  .node[data-depth="3"] > .node-row > .label { font-size: 12px; opacity: 0.75; }
  .node[data-depth="4"] > .node-row > .label,
  .node[data-depth="5"] > .node-row > .label { font-size: 11.5px; opacity: 0.65; }
  .node[data-type="macro"] > .node-row > .icon { color: var(--accent-2); }
  .node-row .color-dot {
    width: 9px; height: 9px; border-radius: 50%; flex: none;
    border: 1px solid rgba(255,255,255,0.25); cursor: pointer;
  }
  .node-row .color-dot.none { background: transparent; border: 1px dashed var(--border); }

  .children { margin-left: 15px; border-left: 1px dashed var(--border); padding-left: 6px; }
  .children.collapsed { display: none; }
  .node-row .caret.has-children { cursor: pointer; }
  .node-row .actions button[data-act="pin"].pinned { color: var(--warn); }

  .color-popover {
    position: fixed; z-index: 300; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; display: flex; gap: 6px; flex-wrap: wrap; width: 132px;
    box-shadow: var(--shadow-md);
  }
  .color-popover .swatch {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
  }
  .color-popover .swatch:hover { border-color: var(--text); }
  .color-popover .swatch.none { background: var(--panel-2); border: 1px dashed var(--muted); position: relative; }
  .color-popover .swatch.none::after { content: "✕"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; color: var(--muted); }

  .search-results .result-item {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px; cursor: pointer; transition: border-color .1s;
  }
  .search-results .result-item:hover { border-color: var(--accent); }
  .search-results .result-path { color: var(--muted); font-size: 10.5px; margin-bottom: 3px; }
  .search-results .result-label { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .search-results .result-snippet { color: var(--muted); font-size: 12px; margin-top: 4px; line-height: 1.4; }
  .search-results .result-snippet mark { background: rgba(255,203,107,0.35); color: var(--text); border-radius: 2px; padding: 0 1px; }
  .search-results .no-results { color: var(--muted); font-size: 12px; padding: 10px 4px; }

  .empty-state { color: var(--muted); text-align: center; padding: 60px 20px; }
  .empty-state .big-icon { font-size: 40px; opacity: .5; margin-bottom: 10px; }
  .macro-view h2 { margin: 0 0 4px; font-size: 19px; letter-spacing: -.01em; }
  .breadcrumb { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .macro-editor {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; min-height: 200px; line-height: 1.6; white-space: pre-wrap;
    font-size: 14px; outline: none;
  }
  .macro-editor:focus { border-color: var(--accent); }
  .macro-editor.flash { animation: flash 0.6s ease; }
  @keyframes flash { 0%,100% { border-color: var(--border); } 50% { border-color: var(--warn); box-shadow: 0 0 0 3px rgba(255,203,107,0.2); } }

  .placeholder-chip {
    display: inline-block; background: rgba(255, 203, 107, 0.18);
    border: 1px solid var(--warn); color: var(--text);
    border-radius: 4px; padding: 0 4px; margin: 0 1px; min-width: 64px;
    outline: none; font-style: normal;
  }
  .placeholder-chip:empty::before {
    content: attr(data-label); color: var(--muted); opacity: 0.65;
    font-style: italic; pointer-events: none;
  }
  .placeholder-chip.filled { background: rgba(126, 226, 184, 0.15); border-color: var(--accent-2); }
  .placeholder-chip:focus { box-shadow: 0 0 0 2px rgba(110, 168, 254, 0.4); }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .tone-btn { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); padding: 5px 11px; border-radius: 999px; font-size: 12px; transition: all .12s; }
  .tone-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(110,168,254,.08); }
  .tone-btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tone-btn-row .tone-btn, .tone-btn-row .btn.sm { font-size: 11px; padding: 3px 9px; }

  .card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; margin-bottom: 12px;
  }
  .card h4 { margin: 0 0 8px; font-size: 13px; font-weight: 600; }
  .suggestion {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; margin-top: 8px; font-size: 13px; line-height: 1.5;
  }
  .suggestion .path { color: var(--muted); font-size: 11px; margin-bottom: 6px; }
  .suggestion .actions { display: flex; gap: 6px; margin-top: 8px; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(3px); animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 0; max-width: 560px; width: 92%; max-height: 88vh; overflow: hidden;
    display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
    animation: popIn .18s ease;
  }
  @keyframes popIn { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal.modal-lg { max-width: 760px; }
  .modal.modal-xl { max-width: 920px; }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border); flex: none;
    background: var(--panel);
  }
  .modal-header h3 { margin: 0; font-size: 15px; }
  .modal-header .close-btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    width: 30px; height: 30px; border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center; padding: 0; font-size: 16px;
    transition: all .12s;
  }
  .modal-header .close-btn:hover { background: rgba(240,113,120,.15); color: var(--danger); border-color: var(--danger); }
  .modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
  .modal .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .modal .row label { font-size: 12px; color: var(--muted); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--border); flex: none; background: var(--panel); }

  .cust-badge-row { display: flex; gap: 8px; margin: 4px 0 12px; flex-wrap: wrap; }
  .case-context-row { display: flex; gap: 6px; margin: 0 0 10px; flex-wrap: wrap; }
  .case-ctx-select { font-size: 11px; padding: 3px 6px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
  .cust-badge-btn {
    padding: 5px 11px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--muted); font-size: 12px; cursor: pointer;
    transition: all .12s;
  }
  .cust-badge-btn:hover { color: var(--text); }
  .cust-badge-btn.active { border-color: var(--accent); color: var(--text); background: rgba(110,168,254,.15); }

  .assistant-tabs { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 4px; }
  .assistant-tab {
    display: flex; align-items: center; gap: 6px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 999px; padding: 5px 8px 5px 12px;
    font-size: 12px; cursor: pointer; transition: all .12s;
  }
  .assistant-tab:hover { border-color: var(--border-2); }
  .assistant-tab.active { border-color: var(--accent); background: rgba(110,168,254,.15); color: var(--text); }
  .assistant-tab .close-x { color: var(--muted); padding: 0 4px; border-radius: 50%; }
  .assistant-tab .close-x:hover { color: var(--danger); background: rgba(240,113,120,.15); }
  .assistant-tab .party-badge { font-size: 10px; opacity: .8; }

  .assistant-log {
    height: 360px; overflow-y: auto; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;
  }
  .chat-msg { display: flex; flex-direction: column; max-width: 88%; }
  .chat-msg.user { align-self: flex-end; align-items: flex-end; }
  .chat-msg.assistant { align-self: flex-start; align-items: flex-start; }
  .chat-bubble { padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere; }
  .chat-msg.user .chat-bubble { background: linear-gradient(180deg, rgba(110,168,254,.22), rgba(110,168,254,.14)); border: 1px solid var(--accent); color: var(--text); }
  .chat-msg.assistant .chat-bubble { background: transparent; border: none; padding: 4px 2px; color: var(--text); }
  .stream-cursor { animation: blink 1s step-start infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }
  .chat-msg .msg-tools { display: flex; gap: 4px; margin-top: 4px; opacity: 0; transition: opacity .15s; }
  .chat-msg:hover .msg-tools { opacity: 1; }
  .chat-msg .btn.sm.ghost { padding: 2px 6px; font-size: 11px; }
  .assistant-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .assistant-input-row textarea { flex: 1; resize: vertical; min-height: 44px; }

  .progress-inline {
    display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--panel-3); border: 1px solid var(--border); border-radius: 999px;
    font-size: 12px; color: var(--muted);
  }
  .progress-inline .spinner {
    width: 12px; height: 12px; border: 2px solid var(--muted); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar {
    height: 6px; background: var(--panel-3); border-radius: 3px; overflow: hidden; margin-top: 6px;
  }
  .progress-bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .2s; }

  .packet-field {
    display: flex; align-items: flex-start; gap: 8px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px;
  }
  .packet-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .packet-field .packet-value { font-size: 13px; flex: 1; white-space: pre-wrap; }
  .packet-field .packet-value.empty-note { color: var(--muted); font-style: italic; font-size: 12px; }

  .backend-choice label { display: block; font-size: 13px; margin: 4px 0; cursor: pointer; }

  .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
  .stat-row:last-child { border: none; }
  .stat-row .count { color: var(--accent); font-weight: 600; }

  .policy-folder {
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden;
    background: var(--panel);
  }
  .policy-folder-header {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    cursor: pointer; background: var(--panel-2); user-select: none;
  }
  .policy-folder-header:hover { background: var(--panel-3); }
  .policy-folder-header .caret { color: var(--muted); font-size: 11px; }
  .policy-folder-body { padding: 8px 12px; display: none; }
  .policy-folder.open .policy-folder-body { display: block; }
  .policy-code-badge {
    background: rgba(110,168,254,.18); border: 1px solid var(--accent); color: var(--accent);
    font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 999px;
  }
  .policy-chunk-row { padding: 6px 0; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 12.5px; }
  .policy-chunk-row:last-child { border: none; }
  .cond-badges { display: inline-flex; gap: 3px; flex-wrap: wrap; margin-left: 6px; vertical-align: middle; }
  .cond-badge {
    background: var(--panel-3); border: 1px solid var(--border); color: var(--muted);
    font-size: 10px; padding: 1px 5px; border-radius: 4px;
  }
  .source-pills { margin-top: 6px; font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .source-pill {
    background: rgba(126,226,184,.12); border: 1px solid var(--accent-2); color: var(--accent-2);
    padding: 1px 8px; border-radius: 999px; cursor: pointer; transition: background .12s;
  }
  .source-pill:hover { background: rgba(126,226,184,.25); }

  [dir="rtl"] .col.tree { border-right: none; border-left: 1px solid var(--border); }
  [dir="rtl"] .col.side { border-left: none; border-right: 1px solid var(--border); }
  [dir="rtl"] .children { margin-left: 0; margin-right: 15px; border-left: none; border-right: 1px dashed var(--border); padding-left: 0; padding-right: 6px; }

  .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
  .toast-root { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast {
    background: var(--panel-2); border: 1px solid var(--accent); color: var(--text);
    padding: 10px 18px; border-radius: 8px; font-size: 13px;
    box-shadow: var(--shadow-md); animation: slideUp .2s ease;
    max-width: 480px;
  }
  .toast.error { border-color: var(--danger); }
  .toast.success { border-color: var(--accent-2); }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .drag-handle { cursor: grab; color: var(--muted-2); padding: 0 4px; user-select: none; }
  .drag-handle:active { cursor: grabbing; }

  kbd {
    background: var(--panel-3); border: 1px solid var(--border-2); border-bottom-width: 2px;
    border-radius: 4px; padding: 1px 5px; font-size: 11px; font-family: ui-monospace, monospace; color: var(--text);
  }

  .shortcut-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px dashed var(--border); }
  .shortcut-row:last-child { border: none; }
  .shortcut-row .name { flex: 1; font-size: 12.5px; }
  .shortcut-row select { min-width: 90px; }

  .country-toggle { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .country-toggle input { width: auto; }

  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: var(--panel-3); border-radius: 4px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: var(--border-2); }
</style>
</head>
<body>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const STORAGE_KEY = "mohammad-macro-playbook-v3";
const OLD_STORAGE_KEY = "mohammad-macro-playbook-v2";
const IDB_NAME = "macro-playbook-db";
const IDB_VERSION = 1;
const API_KEY_STORAGE = "mohammad-macro-playbook-gemini-key";
const OPENROUTER_KEY_STORAGE = "mohammad-macro-playbook-openrouter-key";
const DRAFT_STORAGE_PREFIX = "mmp-draft-";

let GEMINI_API_KEY = localStorage.getItem(API_KEY_STORAGE) || "";
let OPENROUTER_API_KEY = localStorage.getItem(OPENROUTER_KEY_STORAGE) || "";
const GEMINI_MODEL = "gemini-3.5-flash";
const GEMINI_FAST_MODEL = "gemini-3.5-flash";
let lastOpenRouterModelUsed = null;

// Fast + reliable free models. openrouter/free routes automatically.
const DEFAULT_OPENROUTER_MODELS = "openrouter/free, google/gemini-2.5-flash:free, meta-llama/llama-3.3-70b-instruct:free";
const DEFAULT_OPENROUTER_FAST = "google/gemini-2.5-flash:free, openrouter/free, meta-llama/llama-3.3-70b-instruct:free";

const PARTIES = ["customer", "rider", "partner", "calls"];
function partyLabel(p) { return { customer:"Customer", rider:"Rider", partner:"Partner", calls:"Calls" }[p] || p; }
function partyIcon(p) { return { customer:"🧑", rider:"🛵", partner:"🏬", calls:"📞" }[p] || "📁"; }
function partyAudienceNoun(p) { return { customer:"customer", rider:"delivery rider", partner:"restaurant partner", calls:"customer" }[p] || "customer"; }
const COLOR_PALETTE = ["#f07178","#ffcb6b","#7ee2b8","#6ea8fe","#c792ea","#89ddff","#ff8a65","#9aa3b2"];

// Countries the agent handles. UAE + Kuwait default-on; others opt-in.
const ALL_COUNTRY_OPTIONS = [
  { value:"ae", label:"UAE", tag:"country_ae", defaultOn:true },
  { value:"kw", label:"Kuwait", tag:"country_kw", defaultOn:true },
  { value:"qa", label:"Qatar", tag:"country_qa", defaultOn:false },
  { value:"uk", label:"UK", tag:"country_uk", defaultOn:false },
  { value:"ie", label:"Ireland", tag:"country_ie", defaultOn:false },
  { value:"fr", label:"France", tag:"country_fr", defaultOn:false },
  { value:"it", label:"Italy", tag:"country_it", defaultOn:false },
];
const ORDER_TYPE_OPTIONS = [
  { value:"odc", label:"Core ODC", tag:"order_core_odc" },
  { value:"odg", label:"Core ODG", tag:"order_core_odg" },
  { value:"restaurant", label:"Core Restaurant", tag:"order_core_restaurant" },
  { value:"hop", label:"HOP", tag:"order_hop" },
  { value:"grocery", label:"Grocery", tag:"order_grocery" },
  { value:"plus", label:"Plus", tag:"order_plus" }
];
const CHANNEL_OPTIONS = [
  { value:"chat", label:"Chat", tag:"channel_chat" },
  { value:"voice", label:"Voice / Call", tag:"channel_voice" }
];
function activeCountryOptions() {
  const enabled = new Set(state.enabledCountries || ["ae","kw"]);
  return ALL_COUNTRY_OPTIONS.filter(o => enabled.has(o.value));
}
function CASE_DIMENSIONS() {
  return { country: activeCountryOptions(), orderType: ORDER_TYPE_OPTIONS, channel: CHANNEL_OPTIONS };
}

let currentBadge = "grey";
let kbdFocusId = null;
let pendingScrollToId = null;

/* ============================================================
   INDEXEDDB (for policies + drafts — bypasses 5MB localStorage cap)
   ============================================================ */
let idbPromise = null;
function openDB() {
  if (idbPromise) return idbPromise;
  idbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains("policies")) db.createObjectStore("policies", { keyPath: "id" });
      if (!db.objectStoreNames.contains("kv")) db.createObjectStore("kv");
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return idbPromise;
}
async function idbAll(store) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => rej(req.error);
  });
}
async function idbPut(store, val, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, "readwrite");
    const req = key === undefined ? tx.objectStore(store).put(val) : tx.objectStore(store).put(val, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
async function idbGet(store, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbDel(store, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
async function idbClear(store) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, "readwrite");
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
async function idbBulkPut(store, items) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, "readwrite");
    const os = tx.objectStore(store);
    items.forEach(it => os.put(it));
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// In-memory policies cache (loaded from IndexedDB on startup)
let policiesCache = [];

/* ============================================================
   STATE
   ============================================================ */
let state = loadState();
let sessionExpanded = new Set(state.pinnedFolders || []);

function loadState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) raw = localStorage.getItem(OLD_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      migrateState(parsed);
      return parsed;
    }
  } catch (e) { console.error("loadState failed", e); }
  return defaultState();
}
function migrateState(p) {
  if (!p.pinnedFolders) p.pinnedFolders = [];
  if (!p.aiBackend) p.aiBackend = "openrouter";
  if (!p.openRouterModels) p.openRouterModels = DEFAULT_OPENROUTER_MODELS;
  if (!p.openRouterFastModels) p.openRouterFastModels = DEFAULT_OPENROUTER_FAST;
  if (p.trees && Array.isArray(p.trees.en)) {
    p.trees = {
      customer: { en: p.trees.en, ar: p.trees.ar || [] },
      rider: { en: [], ar: [] }, partner: { en: [], ar: [] }, calls: { en: [], ar: [] }
    };
    p.mirror = { customer: p.mirror || {}, rider: {}, partner: {}, calls: {} };
  }
  if (!p.activeParty || !PARTIES.includes(p.activeParty)) p.activeParty = "customer";
  if (!p.assistantChats) p.assistantChats = [];
  if (typeof p.activeAssistantChatId === "undefined") p.activeAssistantChatId = null;
  if (!p.caseContext) p.caseContext = { country:"", orderType:"", channel:"" };
  if (!p.enabledCountries) p.enabledCountries = ["ae","kw"];
  if (!p.shortcuts) p.shortcuts = {}; // { comboString: macroId }
  if (!p.macroDrafts) p.macroDrafts = {}; // per-macro placeholder value persistence (optional; not used but reserved)
  // Delete legacy usage counter data if present — feature removed.
  if (p.usage) delete p.usage;
  // Legacy policies stored inside state — will be migrated to IDB on startup.
  if (!p.policies) p.policies = [];
}

function defaultState() {
  const uid = () => Math.random().toString(36).slice(2, 10);
  const enGreetId = uid();
  const arGreetId = uid();
  return {
    lang: "en", activeParty: "customer", activeId: null,
    aiBackend: "openrouter",
    openRouterModels: DEFAULT_OPENROUTER_MODELS,
    openRouterFastModels: DEFAULT_OPENROUTER_FAST,
    caseContext: { country:"", orderType:"", channel:"" },
    enabledCountries: ["ae","kw"],
    favorites: [], pinnedFolders: [], shortcuts: {},
    policies: [], // legacy; new policies go to IDB via policiesCache
    trees: {
      customer: {
        en: [
          { id: uid(), type:"title", label:"Greetings", color:null, children:[
            { id: enGreetId, type:"macro", label:"Welcome message", color:null, text:"Hi [Customer Name], thank you for reaching out! How can I help you today?", children:[] }
          ]},
          { id: uid(), type:"title", label:"Refunds", color:null, children:[] }
        ],
        ar: [
          { id: uid(), type:"title", label:"التحيات", color:null, children:[
            { id: arGreetId, type:"macro", label:"رسالة ترحيب", color:null, text:"مرحباً [اسم العميل]، شكراً لتواصلك معنا! كيف يمكنني مساعدتك اليوم؟", children:[] }
          ]},
          { id: uid(), type:"title", label:"المبالغ المستردة", color:null, children:[] }
        ]
      },
      rider: { en:[], ar:[] }, partner: { en:[], ar:[] }, calls: { en:[], ar:[] }
    },
    mirror: { customer: { [enGreetId]: arGreetId }, rider:{}, partner:{}, calls:{} },
    assistantChats: [], activeAssistantChatId: null
  };
}

function save() {
  try {
    // Keep small — policies live in IDB now. If someone still has legacy state.policies with big data, migrate.
    const clone = { ...state, policies: [] };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clone));
  } catch (e) {
    if (e && e.name === "QuotaExceededError") {
      toast("Storage full — trimming old chat messages", "error");
      // Trim assistant chats to last 20 msgs each
      state.assistantChats.forEach(c => { if (c.messages.length > 20) c.messages = c.messages.slice(-20); });
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, policies: [] })); } catch (e2) {}
    } else { console.error(e); }
  }
}
const uid = () => Math.random().toString(36).slice(2, 10);

async function bootstrapPolicies() {
  // On first load with v3, migrate legacy policies from state to IDB
  policiesCache = await idbAll("policies");
  if (!policiesCache.length && state.policies && state.policies.length) {
    await idbBulkPut("policies", state.policies);
    policiesCache = state.policies;
    state.policies = [];
    save();
  }
  policiesCache.forEach(p => { if (!p.party) p.party = "general"; });
}

async function persistPolicy(p) {
  await idbPut("policies", p);
  const i = policiesCache.findIndex(x => x.id === p.id);
  if (i >= 0) policiesCache[i] = p; else policiesCache.push(p);
}
async function persistPolicies(list) {
  await idbBulkPut("policies", list);
  list.forEach(p => {
    const i = policiesCache.findIndex(x => x.id === p.id);
    if (i >= 0) policiesCache[i] = p; else policiesCache.push(p);
  });
}
async function deletePolicyById(id) {
  await idbDel("policies", id);
  policiesCache = policiesCache.filter(p => p.id !== id);
}
async function deletePoliciesByArticleId(articleId) {
  const gone = policiesCache.filter(p => p.articleId === articleId);
  for (const p of gone) await idbDel("policies", p.id);
  policiesCache = policiesCache.filter(p => p.articleId !== articleId);
}

/* ============================================================
   TREE HELPERS
   ============================================================ */
function currentTree() { return state.trees[state.activeParty][state.lang]; }
function findNode(id, tree = currentTree(), parent = null, path = []) {
  for (const n of tree) {
    if (n.id === id) return { node: n, parent, siblings: tree, path };
    const found = findNode(id, n.children || [], n, [...path, n]);
    if (found) return found;
  }
  return null;
}
function findNodeInLang(id, lang, party = state.activeParty) { return findNode(id, state.trees[party][lang]); }
function findNodeInAnyParty(id) {
  for (const p of PARTIES) {
    for (const lang of ["en","ar"]) {
      const f = findNode(id, state.trees[p][lang]);
      if (f) return { ...f, party: p, lang };
    }
  }
  return null;
}
function removeNode(id) {
  const f = findNode(id);
  if (!f) return;
  f.siblings.splice(f.siblings.indexOf(f.node), 1);
  const mirrorId = getMirrorId(id);
  if (mirrorId) {
    const otherLang = state.lang === "en" ? "ar" : "en";
    const mf = findNodeInLang(mirrorId, otherLang);
    if (mf) mf.siblings.splice(mf.siblings.indexOf(mf.node), 1);
    deleteMirror(id);
  }
  if (state.activeId === id) state.activeId = null;
}
function getMirrorId(id, party = state.activeParty) {
  const m = state.mirror[party];
  if (m[id]) return m[id];
  for (const [k, v] of Object.entries(m)) if (v === id) return k;
  return null;
}
function setMirror(enId, arId, party = state.activeParty) { state.mirror[party][enId] = arId; }
function deleteMirror(id, party = state.activeParty) {
  const m = state.mirror[party];
  delete m[id];
  for (const [k, v] of Object.entries(m)) if (v === id) delete m[k];
}
function switchParty(party) {
  if (!PARTIES.includes(party) || party === state.activeParty) return;
  state.activeParty = party;
  state.activeId = null; kbdFocusId = null;
  document.getElementById("search").value = "";
  save(); render();
}

/* ============================================================
   RENDERING
   ============================================================ */
function render() {
  document.documentElement.dir = state.lang === "ar" ? "rtl" : "ltr";
  document.querySelectorAll("#lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === state.lang));
  renderPartyTabs();
  renderTree();
  renderCenter();
  renderFavorites();
  renderGlobalBadgeRow();
  save();
  if (pendingScrollToId) {
    const id = pendingScrollToId; pendingScrollToId = null;
    scrollNodeIntoView(id);
  }
}

function renderPartyTabs() {
  const el = document.getElementById("party-tabs");
  if (!el) return;
  el.innerHTML = PARTIES.map(p => {
    const macroCount = flattenMacros(state.lang, p).length;
    return `<button class="party-tab${p === state.activeParty ? " active" : ""}" onclick="switchParty('${p}')">${partyIcon(p)} ${partyLabel(p)} <span class="count">${macroCount}</span></button>`;
  }).join("");
}

function scrollNodeIntoView(id) {
  requestAnimationFrame(() => {
    const el = document.querySelector(`.node-row[data-id="${CSS.escape(id)}"]`);
    if (!el) return;
    el.scrollIntoView({ block:"center", behavior:"smooth" });
    el.classList.add("flash-row");
    setTimeout(() => el.classList.remove("flash-row"), 1400);
  });
}
function openNodeInTree(id) {
  const f = findNode(id);
  if (!f) { const any = findNodeInAnyParty(id); if (any) { switchParty(any.party); setTimeout(() => openNodeInTree(id), 40); } return; }
  f.path.forEach(p => sessionExpanded.add(p.id));
  const hasChildren = !!(f.node.children && f.node.children.length);
  if (hasChildren && f.node.type === "title") sessionExpanded.add(f.node.id);
  kbdFocusId = id;
  state.activeId = id;
  const searchBox = document.getElementById("search");
  if (searchBox) searchBox.value = "";
  pendingScrollToId = id;
  render();
}

function renderTree() {
  const container = document.getElementById("tree");
  const query = document.getElementById("search").value.trim().toLowerCase();
  container.innerHTML = "";
  if (query) { container.appendChild(renderSearchResults(query)); return; }
  currentTree().forEach((n, i) => container.appendChild(renderNode(n, 0, null, i)));
}

function nodeMatches(n, q) {
  if (!q) return true;
  if (n.label.toLowerCase().includes(q)) return true;
  if (n.text && n.text.toLowerCase().includes(q)) return true;
  return (n.children || []).some(c => nodeMatches(c, q));
}

function computeSearchResults(query) {
  const results = [];
  const otherLang = state.lang === "ar" ? "en" : "ar";
  const walk = (nodes, path) => nodes.forEach(n => {
    const labelHit = n.label.toLowerCase().includes(query);
    const textHit = !!(n.text && n.text.toLowerCase().includes(query));
    let mirrorHit = null;
    if (!labelHit && !textHit) {
      const mirrorId = getMirrorId(n.id);
      if (mirrorId) {
        const mf = findNodeInLang(mirrorId, otherLang);
        if (mf) {
          const m = mf.node;
          const mLabelHit = m.label.toLowerCase().includes(query);
          const mTextHit = !!(m.text && m.text.toLowerCase().includes(query));
          if (mLabelHit || mTextHit) mirrorHit = { node:m, labelHit:mLabelHit, textHit:mTextHit };
        }
      }
    }
    if (labelHit || textHit || mirrorHit) results.push({ node:n, path, labelHit, textHit, mirrorHit });
    walk(n.children || [], [...path, n.label]);
  });
  walk(currentTree(), []);
  return results;
}

function renderSearchResults(query) {
  const box = document.createElement("div");
  box.className = "search-results";
  const results = computeSearchResults(query);
  if (!results.length) {
    box.innerHTML = `<div class="no-results">No matches for "${escapeHtml(query)}".</div>`;
    return box;
  }
  results.forEach(r => {
    const item = document.createElement("div");
    item.className = "result-item";
    const icon = r.node.type === "title" ? "📁" : "📝";
    const dot = r.node.color ? `<span class="color-dot" style="background:${r.node.color}"></span>` : "";
    const pathStr = r.path.length ? r.path.join(" › ") : (r.node.type === "title" ? "Top level" : "");
    let snippetHtml = "";
    if (r.textHit) snippetHtml = `<div class="result-snippet">${highlightSnippet(r.node.text, query)}</div>`;
    else if (r.mirrorHit && r.mirrorHit.textHit) snippetHtml = `<div class="result-snippet">(matched via ${state.lang === "ar" ? "English" : "Arabic"} version) ${highlightSnippet(r.mirrorHit.node.text, query)}</div>`;
    else if (r.mirrorHit && r.mirrorHit.labelHit) snippetHtml = `<div class="result-snippet">(matched via ${state.lang === "ar" ? "English" : "Arabic"} title: "${escapeHtml(r.mirrorHit.node.label)}")</div>`;
    item.innerHTML = `
      <div class="result-path">${escapeHtml(pathStr)}</div>
      <div class="result-label">${dot}${icon} ${escapeHtml(r.node.label)}</div>
      ${snippetHtml}`;
    item.addEventListener("click", () => openNodeInTree(r.node.id));
    box.appendChild(item);
  });
  return box;
}

function highlightSnippet(text, query, radius = 60) {
  const lower = text.toLowerCase();
  const idx = lower.indexOf(query);
  if (idx === -1) return escapeHtml(text.slice(0, 100)) + (text.length > 100 ? "…" : "");
  const start = Math.max(0, idx - radius);
  const end = Math.min(text.length, idx + query.length + radius);
  const snippet = text.slice(start, end);
  const prefix = start > 0 ? "…" : "";
  const suffix = end < text.length ? "…" : "";
  const before = escapeHtml(snippet.slice(0, idx - start));
  const match = escapeHtml(snippet.slice(idx - start, idx - start + query.length));
  const after = escapeHtml(snippet.slice(idx - start + query.length));
  return prefix + before + `<mark>${match}</mark>` + after + suffix;
}

/* ---------- Long-press drag reorder for TOP-LEVEL folders ---------- */
let longPressTimer = null;
let dragState = null;

function renderNode(node, depth, parentEl = null, index = 0) {
  const wrap = document.createElement("div");
  wrap.className = "node";
  wrap.dataset.type = node.type;
  wrap.dataset.depth = depth;
  wrap.dataset.id = node.id;

  const hasChildren = !!(node.children && node.children.length);
  const isTitle = node.type === "title";
  const isPinned = state.pinnedFolders.includes(node.id);
  const isExpanded = !hasChildren || !isTitle || sessionExpanded.has(node.id);
  const isTopLevel = depth === 0;

  const row = document.createElement("div");
  row.className = "node-row" + (state.activeId === node.id ? " active" : "") + (kbdFocusId === node.id ? " kbd-focus" : "");
  row.dataset.id = node.id;
  const isFav = state.favorites.includes(node.id);
  const icon = node.type === "title" ? "📁" : "📝";
  const caret = hasChildren ? (isExpanded ? "▾" : "▸") : "";
  const dotStyle = node.color ? `style="background:${node.color}"` : "";
  const shortcut = Object.entries(state.shortcuts || {}).find(([k, v]) => v === node.id);
  const shortcutHtml = shortcut ? `<span class="shortcut-hint" title="Keyboard shortcut">${escapeHtml(shortcut[0])}</span>` : "";
  row.innerHTML = `
    <span class="caret${hasChildren ? " has-children" : ""}">${caret}</span>
    <span class="color-dot${node.color ? "" : " none"}" ${dotStyle} title="Set color" data-act="color"></span>
    <span class="icon">${icon}</span>
    <span class="label">${escapeHtml(node.label)}</span>
    ${shortcutHtml}
    ${isFav ? '<span class="fav">★</span>' : ''}
    <span class="actions">
      <button title="Add child" data-act="add">+</button>
      ${isTitle ? `<button title="${isPinned ? 'Unpin (auto-collapse on reload)' : 'Pin open (stay expanded on reload)'}" data-act="pin" class="${isPinned ? 'pinned' : ''}">📌</button>` : ''}
      <button title="Favorite" data-act="fav">★</button>
      <button title="Rename" data-act="edit">✎</button>
      <button title="Delete" data-act="del">🗑</button>
    </span>`;

  row.addEventListener("click", (e) => {
    const act = e.target.dataset.act;
    if (act === "add") { e.stopPropagation(); addChildTo(node.id); return; }
    if (act === "fav") { e.stopPropagation(); toggleFav(node.id); return; }
    if (act === "edit") { e.stopPropagation(); renameNode(node.id); return; }
    if (act === "pin") { e.stopPropagation(); toggleFolderPin(node.id); return; }
    if (act === "color") { e.stopPropagation(); openColorPopover(e.target, node.id); return; }
    if (act === "del") { e.stopPropagation(); if (confirm(`Delete "${node.label}"?`)) { removeNode(node.id); render(); } return; }
    if (hasChildren && isTitle && e.target.closest(".label, .caret, .icon")) {
      kbdFocusId = node.id;
      toggleFolderExpanded(node.id, /*autoClose=*/true);
      return;
    }
    kbdFocusId = node.id;
    state.activeId = node.id;
    render();
  });

  // Long-press to drag reorder — top-level folders only
  if (isTopLevel && isTitle) {
    const startLongPress = (ev) => {
      if (ev.target.closest("[data-act]")) return;
      longPressTimer = setTimeout(() => {
        row.draggable = true;
        row.classList.add("dragging");
        dragState = { fromId: node.id, fromIndex: index };
        toast("Drag to reorder folder");
      }, 450);
    };
    const cancelLongPress = () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } };
    row.addEventListener("mousedown", startLongPress);
    row.addEventListener("touchstart", startLongPress, { passive: true });
    row.addEventListener("mouseup", cancelLongPress);
    row.addEventListener("mouseleave", cancelLongPress);
    row.addEventListener("touchend", cancelLongPress);

    row.addEventListener("dragstart", (e) => {
      dragState = { fromId: node.id, fromIndex: index };
      e.dataTransfer.effectAllowed = "move";
      try { e.dataTransfer.setData("text/plain", node.id); } catch(_){}
      row.classList.add("dragging");
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      row.draggable = false;
      document.querySelectorAll(".drop-above,.drop-below").forEach(el => el.classList.remove("drop-above","drop-below"));
      dragState = null;
    });
    row.addEventListener("dragover", (e) => {
      if (!dragState || dragState.fromId === node.id) return;
      e.preventDefault();
      const rect = row.getBoundingClientRect();
      const above = e.clientY < rect.top + rect.height / 2;
      row.classList.toggle("drop-above", above);
      row.classList.toggle("drop-below", !above);
    });
    row.addEventListener("dragleave", () => row.classList.remove("drop-above","drop-below"));
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      if (!dragState) return;
      const tree = currentTree();
      const from = tree.findIndex(n => n.id === dragState.fromId);
      const to = tree.findIndex(n => n.id === node.id);
      if (from < 0 || to < 0 || from === to) return;
      const rect = row.getBoundingClientRect();
      const above = e.clientY < rect.top + rect.height / 2;
      const [moved] = tree.splice(from, 1);
      let insertAt = tree.findIndex(n => n.id === node.id);
      if (!above) insertAt += 1;
      tree.splice(insertAt, 0, moved);
      row.classList.remove("drop-above","drop-below");
      save(); render();
    });
  }

  wrap.appendChild(row);
  if (hasChildren) {
    const kids = document.createElement("div");
    kids.className = "children" + (isExpanded ? "" : " collapsed");
    node.children.forEach((c, i) => kids.appendChild(renderNode(c, depth + 1, wrap, i)));
    wrap.appendChild(kids);
  }
  return wrap;
}

// Auto-close sibling folders when opening a new one at the same depth
function toggleFolderExpanded(id, autoClose = false) {
  if (sessionExpanded.has(id)) { sessionExpanded.delete(id); renderTree(); return; }
  if (autoClose) {
    const f = findNode(id);
    if (f) {
      const siblings = f.siblings;
      siblings.forEach(s => { if (s.id !== id && s.type === "title") sessionExpanded.delete(s.id); });
    }
  }
  sessionExpanded.add(id);
  renderTree();
}
function toggleFolderPin(id) {
  const i = state.pinnedFolders.indexOf(id);
  if (i >= 0) state.pinnedFolders.splice(i, 1);
  else { state.pinnedFolders.push(id); sessionExpanded.add(id); }
  save(); renderTree();
}

function openColorPopover(anchorEl, nodeId) {

    COLOR_PALETTE.map(c => `<div class="swatch" style="background:${c}" data-color="${c}"></div>`).join("");
  pop.addEventListener("click", (e) => {
    const sw = e.target.closest(".swatch"); if (!sw) return;

function renderMacroEditor(el, text) {
  el.innerHTML = "";
  const parts = text.split(/(\[[^\]]+\])/g);
  parts.forEach(part => {
    if (/^\[[^\]]+\]$/.test(part)) {
      const chip = document.createElement("span");
      chip.className = "placeholder-chip";
      chip.contentEditable = "true";
      chip.dataset.placeholder = part;
      chip.dataset.label = part.slice(1, -1);
      chip.textContent = "";
      chip.addEventListener("input", () => chip.classList.toggle("filled", chip.textContent.trim().length > 0));
      el.appendChild(chip);
    } else if (part) el.appendChild(document.createTextNode(part));
  });
}

function serializeEditor(el) {
  let out = "";
  el.childNodes.forEach(n => {
    if (n.nodeType === Node.TEXT_NODE) out += n.textContent;
    else if (n.classList && n.classList.contains("placeholder-chip")) {
      const typed = n.textContent.trim();
      out += typed ? n.textContent : n.dataset.placeholder;
    } else if (n.nodeType === Node.ELEMENT_NODE) out += n.textContent;
  });
  return out;
}

function resetEditorChips(el) {
  el.querySelectorAll(".placeholder-chip").forEach(chip => { chip.textContent = ""; chip.classList.remove("filled"); });
}

function collectAllFolders(party = state.activeParty, lang = state.lang) {
  const list = [];
  const walk = (nodes, path) => nodes.forEach(n => {
    if (n.type === "title") { list.push({ id: n.id, path: [...path, n.label].join(" › ") }); walk(n.children || [], [...path, n.label]); }
  });
  walk(state.trees[party][lang], []);
  return list;
}

async function submitNodeModal() {
  const type = document.getElementById("nm-type").value;
  const label = document.getElementById("nm-label").value.trim();
  const text = type === "macro" ? document.getElementById("nm-text").value : "";
  const sync = document.getElementById("nm-sync").checked;
  const parentId = document.getElementById("nm-parent").value || null;
  if (!label) { toast("Label required", "error"); return; }

  const newNode = { id: uid(), type, label, text, color: null, children: [] };
  const parent = parentId ? findNode(parentId) : null;
  if (parent) parent.node.children.push(newNode); else currentTree().push(newNode);

  if (sync) {
    const otherLang = state.lang === "en" ? "ar" : "en";
    let mirrorParentId = null;
    if (parentId) { const mp = getMirrorId(parentId); if (mp) mirrorParentId = mp; }
    const mirrorNode = {
      id: uid(), type,
      label: aiReady() ? (await translateText(label, otherLang)) || label : label,
      text: (type === "macro" && text && aiReady()) ? (await translateText(text, otherLang)) || text : text,
      color: newNode.color, children: []
    };
    if (mirrorParentId) {
      const mp = findNodeInLang(mirrorParentId, otherLang);
      if (mp) mp.node.children.push(mirrorNode); else state.trees[state.activeParty][otherLang].push(mirrorNode);
    } else state.trees[state.activeParty][otherLang].push(mirrorNode);
    const enId = state.lang === "en" ? newNode.id : mirrorNode.id;
    const arId = state.lang === "en" ? mirrorNode.id : newNode.id;
    setMirror(enId, arId);
  }

  state.activeId = newNode.id;
  closeModal(); render();
  toast("Saved", "success");
}

async function importArticleJSON(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) { toast("Choose at least one .json file first"); return; }
  const targetParty = document.getElementById("policy-party") ? document.getElementById("policy-party").value : state.activeParty;
  const progBox = document.getElementById("import-progress-modal") || document.getElementById("import-progress");
  let totalChunks = 0, totalArticles = 0, totalRedirects = 0;
  const errors = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (progBox) progBox.innerHTML = `<div class="progress-inline"><div class="spinner"></div>Importing ${i+1} / ${files.length} — ${escapeHtml(file.name)}</div><div class="progress-bar"><div style="width:${Math.round((i / files.length) * 100)}%"></div></div>`;
    // Yield to the UI so it stays responsive
    await new Promise(r => (window.requestIdleCallback || setTimeout)(r, 0));
    try {
      const raw = await file.text();
      const parsed = JSON.parse(raw);
      const articles = Array.isArray(parsed) ? parsed : [parsed];
      for (const art of articles) {
        if (!art || !Array.isArray(art.chunks)) continue;
        const articleName = art.article || file.name.replace(/\.json$/i, "");
        const articleId = art.gemId || uid();
        if (art.gemId) await deletePoliciesByArticleId(art.gemId);
        // Detect if this is a contact-reason / tag catalog article
        const detectedContactReason = detectContactReasonFromArticle(articleName);
        const detectedTag = detectTagFromArticle(articleName);
        const newChunks = [];
        for (const ch of art.chunks) {
          if (!ch || !ch.text) continue;
          const normPath = (ch.path || []).map(x => {
            if (Array.isArray(x)) return { q: x[0] || "", a: x[1] || "" };
            if (x && typeof x === "object") return { q: x.q || "", a: x.a || "" };
            return { q: "", a: String(x || "") };
          });
          const pathLabel = normPath.map(x => x.a).filter(Boolean).join(" › ");
          const title = pathLabel ? `${articleName} › ${pathLabel}` : (ch.title || articleName);
          const rec = {
            id: uid(), title, text: ch.text, party: targetParty,
            ingestedAt: new Date().toISOString(),
            article: articleName,
            policyCode: art.policyCode || null,
            articleId, url: art.url,
            path: normPath,
            conditions: ch.conditions || [],
            mentioned: ch.mentioned || [],
            leafType: ch.leaf_type || null,
            externalUrl: ch.externalUrl || null,
            externalGemId: ch.externalGemId || null,
            contactReason: ch.contact_reason || ch.contactReason || detectedContactReason || null,
            tag: ch.tag || detectedTag || null,
          };
          newChunks.push(rec);
          totalChunks++;
          if (ch.leaf_type === "external_link") totalRedirects++;
        }
        if (newChunks.length) await persistPolicies(newChunks);
        totalArticles++;
      }
    } catch (e) {
      console.error(e);
      errors.push(`${file.name}: ${e.message}`);
    }
  }
  if (progBox) progBox.innerHTML = `<div style="color:var(--accent-2); font-size:12px">✓ Done — imported ${totalArticles} article(s), ${totalChunks} chunk(s).${errors.length ? `<br><span style="color:var(--danger)">${errors.length} failed: ${errors.slice(0,3).join("; ")}</span>` : ""}</div>`;
  toast(`Imported ${totalArticles} article(s) → ${totalChunks} chunk(s)`, "success");
  if (typeof renderSettingsBody === "function" && document.getElementById("settings-body")) renderSettingsBody();
}

function detectContactReasonFromArticle(name) {
  const n = (name || "").toLowerCase();
  if (/contact.?reason/.test(n)) return null;
  if (/cancel/.test(n)) return "Cancellation";
  if (/refund/.test(n)) return "Refund";
  if (/late|delay/.test(n)) return "Late delivery";
  if (/missing|item/.test(n)) return "Missing item";
  if (/wrong/.test(n)) return "Wrong item";
  if (/damaged|quality/.test(n)) return "Damaged/quality issue";
  if (/rider/.test(n)) return "Rider issue";
  return null;
}
function detectTagFromArticle(name) {
  const n = (name || "").toLowerCase();
  if (/cancel/.test(n)) return "#Cancellation";
  if (/refund/.test(n)) return "#Refund";
  if (/late|delay/.test(n)) return "#LateDelivery";
  if (/missing/.test(n)) return "#MissingItem";
  if (/wrong/.test(n)) return "#WrongItem";
  if (/damaged/.test(n)) return "#Damaged";
  if (/rider/.test(n)) return "#RiderIssue";
  return null;
}

async function ingestPolicy() {
  const text = document.getElementById("policy-text").value.trim();
  const title = document.getElementById("policy-title").value;
  const policyParty = document.getElementById("policy-party").value;
  if (!text) return;
  await addPolicyRecord(title, text, policyParty);
  if (!aiReady()) { aiNotReadyToast(); closeModal(); return; }
  const stop = showFullPageProgress("AI is generating tree…");
  const prompt = `You are a customer service knowledge architect. Parse the following company policy into a LOGICALLY NESTED hierarchy of folders (titles) and macros — do not flatten everything into one level. Return STRICT JSON only, no markdown fences:
{"tree":[{"type":"title","label":"...","children":[{"type":"macro","label":"...","text":"..."}]}]}
Macro "text" is ready-to-send customer response — warm, professional, firm where required. Use [brackets] for placeholders.\n\nPOLICY:\n${text}`;
  const result = await aiGenerate(prompt);
  stop();
  try {
    const cleaned = (result || "").replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(cleaned);
    const enNodes = normalizeTree(parsed.tree || []);
    state.trees[state.activeParty].en.push(...enNodes);
    const stop2 = showFullPageProgress("Translating to Arabic…");
    const arNodes = await deepTranslateTree(enNodes, "ar");
    stop2();
    state.trees[state.activeParty].ar.push(...arNodes);
    linkMirrors(enNodes, arNodes);
    save(); closeModal(); render();
    toast("Policy ingested & translated", "success");
  } catch (e) {
    console.error(e, result);
    toast("AI returned invalid JSON. Policy saved as text.", "error");
    closeModal();
  }
}

function normalizeTree(nodes) {
  return nodes.map(n => ({
    id: uid(), type: n.type === "title" ? "title" : "macro",
    label: n.label || "Untitled", text: n.text || "", color: null,
    children: normalizeTree(n.children || [])
  }));
}

async function deepTranslateTree(nodes, targetLang) {
  const strings = [];
  const collect = (list) => list.forEach(n => { strings.push(n.label); strings.push(n.type === "macro" ? (n.text || "") : ""); collect(n.children || []); });
  collect(nodes);
  const translated = (strings.length && aiReady()) ? await batchTranslate(strings, targetLang) : strings;
  let i = 0;
  const rebuild = (list) => list.map(n => {
    const label = translated[i] || n.label; i++;
    const text = translated[i] || ""; i++;
    return { id: uid(), type: n.type, label, text: n.type === "macro" ? text : "", color: n.color || null, children: rebuild(n.children || []) };
  });
  return rebuild(nodes);
}
async function batchTranslate(strings, targetLang) {
  if (!strings.length) return strings.slice();
  const CHUNK = 40;
  const out = [];
  for (let i = 0; i < strings.length; i += CHUNK) out.push(...(await batchTranslateChunk(strings.slice(i, i + CHUNK), targetLang)));
  return out;
}
async function batchTranslateChunk(strings, targetLang) {
  const instruction = targetLang === "ar"
    ? "Translate each string in this JSON array into natural, professional Modern Standard Arabic, the way a well-trained bilingual customer service agent actually writes it."
    : "Translate each string in this JSON array into natural, professional English customer-service writing.";
  const prompt = `${instruction} Preserve [bracket placeholders] EXACTLY as-is. Return STRICT JSON only: array of translated strings, same length and order.\n\nInput:\n${JSON.stringify(strings)}`;
  const out = await aiGenerate(prompt);
  if (!out) return strings.slice();
  try {
    const parsed = JSON.parse(out.replace(/```json|```/g, "").trim());
    if (Array.isArray(parsed) && parsed.length === strings.length) return parsed;
  } catch (e) {}
  return strings.slice();
}
function linkMirrors(en, ar) {
  for (let i = 0; i < en.length && i < ar.length; i++) {
    setMirror(en[i].id, ar[i].id);
    linkMirrors(en[i].children || [], ar[i].children || []);
  }
}

const POLICY_STOPWORDS = new Set("the a an is are was were to of and or in on for with this that it be if we our you your i he she they them his her its from as at by not no do does did has have had will would can could should must اذا في من الى على عن هذا هذه و او ان كان".split(/\s+/));

function isChunkCompatibleWithCase(p, caseContext) {
  const hard = p.conditions || [];
  if (!hard.length || !caseContext) return true;
  const dims = CASE_DIMENSIONS();
  for (const dim of Object.keys(dims)) {
    const val = caseContext[dim];
    if (!val) continue;
    const opts = dims[dim];
    const opt = opts.find(o => o.value === val);
    if (!opt) continue;
    const dimTags = opts.map(o => o.tag);
    const present = hard.filter(t => dimTags.includes(t));
    if (present.length && !present.includes(opt.tag)) return false;
  }
  // Also exclude any policy tagged with a disabled country
  const enabledCountryTags = new Set(activeCountryOptions().map(o => o.tag));
  const allCountryTags = ALL_COUNTRY_OPTIONS.map(o => o.tag);
  const hasCountryTag = hard.some(t => allCountryTags.includes(t));
  if (hasCountryTag) {
    const hasEnabled = hard.some(t => enabledCountryTags.has(t));
    if (!hasEnabled) return false;
  }
  return true;
}

function groupedPolicyList() {
  const groups = new Map();
  policiesCache.forEach(p => {
    const key = p.articleId || ("standalone:" + p.id);
    if (!groups.has(key)) groups.set(key, { articleId: p.articleId || null, article: p.article || null, policyCode: p.policyCode || null, chunks: [] });
    groups.get(key).chunks.push(p);
  });
  return Array.from(groups.values());
}

function badgeConditionTags(badge) {
  if (badge === "red") return ["red_badge","red_badge_no_star","red_badge_with_star"];
  if (badge === "gold") return ["gold_badge"];
  return [];
}

function getRelevantPolicies(query, max = 4, party = state.activeParty, caseContext = state.caseContext, badge = currentBadge) {
  if (!policiesCache.length) return [];
  const terms = (query || "").toLowerCase().split(/[^a-z0-9\u0600-\u06FF]+/i).filter(w => w.length > 2 && !POLICY_STOPWORDS.has(w));
  if (!terms.length) return [];
  const badgeTags = badgeConditionTags(badge);
  const dims = CASE_DIMENSIONS();
  const scoreOf = (p) => {
    const titleHay = (p.title || "").toLowerCase();
    const articleHay = (p.article || "").toLowerCase();
    const pathHay = (p.path || []).map(x => (x && typeof x === "object") ? `${x.q || ""} ${x.a || ""}` : String(x || "")).join(" ").toLowerCase();
    const bodyHay = (p.text || "").toLowerCase();
    let score = 0;
    terms.forEach(w => {
      if (titleHay.includes(w)) score += 3;
      if (articleHay.includes(w)) score += 2;
      if (pathHay.includes(w)) score += 2;
      if (bodyHay.includes(w)) score += 1;
    });
    (p.conditions || []).forEach(tag => {
      if (badgeTags.includes(tag)) score += 5;
      Object.values(dims).forEach(opts => {
        const opt = opts.find(o => o.tag === tag);
        if (opt && caseContext && Object.keys(dims).some(dim => caseContext[dim] === opt.value)) score += 4;
      });
    });
    (p.mentioned || []).forEach(tag => { if (badgeTags.includes(tag)) score += 1; });
    return score;
  };
  const ownPool = policiesCache.filter(p => p.party === party || p.party === "general");
  const compatible = ownPool.filter(p => isChunkCompatibleWithCase(p, caseContext));
  let scored = compatible.map(p => ({ p, score: scoreOf(p) })).filter(x => x.score > 0).sort((a,b) => b.score - a.score);
  if (scored.length) return scored.slice(0, max).map(x => x.p);
  scored = ownPool.map(p => ({ p, score: scoreOf(p) })).filter(x => x.score > 0).sort((a,b) => b.score - a.score);
  if (scored.length) return scored.slice(0, max).map(x => x.p);
  scored = policiesCache.filter(p => isChunkCompatibleWithCase(p, caseContext)).map(p => ({ p, score: scoreOf(p) })).filter(x => x.score > 0).sort((a,b) => b.score - a.score);
  return scored.slice(0, max).map(x => x.p);
}

const POLICY_CONTEXT_CHAR_BUDGET = 3200; // tighter than before → faster AI
const MACRO_CONTEXT_CHAR_BUDGET = 1500;

async function policyContextFor(query, party = state.activeParty, caseContext = state.caseContext, badge = currentBadge) {
  const rel = getRelevantPolicies(query, 4, party, caseContext, badge);
  if (!rel.length) return "(No specific policy matched. Use general customer-service judgment and say plainly when the answer isn't policy-sourced.)";
  let budget = POLICY_CONTEXT_CHAR_BUDGET;
  const parts = [];
  for (const p of rel) {
    if (budget <= 0) break;
    const scopeNote = p.party === party ? "" : p.party === "general" ? " (general)" : ` (from ${partyLabel(p.party)})`;
    const crumbs = [];
    if (p.policyCode) crumbs.push(`[${p.policyCode}]`);
    if (p.article) crumbs.push(p.article);
    (p.path || []).forEach(x => { const a = (x && typeof x === "object") ? x.a : x; if (a) crumbs.push(a); });
    const header = crumbs.length ? crumbs.join(" › ") : p.title;
    const linkNote = p.leafType === "external_link" ? " — ⚠️ REDIRECT STUB (not real content)" : "";
    let text = p.text || "";
    if (text.length > budget) text = text.slice(0, budget) + "…";
    parts.push(`[${header}${scopeNote}${linkNote}]\n${text}`);
    budget -= text.length;
  }
  return parts.join("\n\n");
}

function policySourcesFor(query, party = state.activeParty, caseContext = state.caseContext, badge = currentBadge) {
  return getRelevantPolicies(query, 4, party, caseContext, badge);
}

function sourcesHtml(sources) {
  if (!sources || !sources.length) return "";
  return `<div class="source-pills">📄 Sources: ${sources.map(p => {
    const label = p.policyCode ? `[${p.policyCode}] ${p.path && p.path.length ? p.path[p.path.length-1].a : p.title}` : p.title;
    const prefix = p.leafType === "external_link" ? "🔗 " : "";
    return `<span class="source-pill" onclick="openPolicyEditor('${p.id}')" title="Open source">${prefix}${escapeHtml(label.slice(0, 42))}</span>`;
  }).join("")}</div>`;
}

function relevantMacrosFor(query, max = 3, party = state.activeParty) {
  const terms = (query || "").toLowerCase().split(/[^a-z0-9\u0600-\u06FF]+/i).filter(w => w.length > 2 && !POLICY_STOPWORDS.has(w));
  if (!terms.length) return [];
  const scoreOf = (m) => {
    const hay = (m.node.label + " " + m.node.text).toLowerCase();
    return terms.reduce((s, w) => s + (hay.includes(w) ? 1 : 0), 0);
  };
  const ownPool = flattenMacros(state.lang, party);
  let scored = ownPool.map(m => ({ m, score: scoreOf(m) })).filter(x => x.score > 0).sort((a,b) => b.score - a.score);
  return scored.slice(0, max).map(x => x.m);
}
async function macroContextFor(query, party = state.activeParty) {
  const rel = relevantMacrosFor(query, 3, party);
  if (!rel.length) return "(No matching saved macro — draft fresh, consistent with policy.)";
  let budget = MACRO_CONTEXT_CHAR_BUDGET;
  const parts = [];
  for (const m of rel) {
    if (budget <= 0) break;
    let text = m.node.text || "";
    if (text.length > budget) text = text.slice(0, budget) + "…";
    parts.push(`[Macro: ${m.node.label}]\n${text}`);
    budget -= text.length;
  }
  return parts.join("\n\n");
}

function findMatchingCategoryFromPolicies(query, party = state.activeParty) {
  const rel = getRelevantPolicies(query, 3, party);
  for (const p of rel) {
    if (p.contactReason || p.tag) return { contactReason: p.contactReason || null, tag: p.tag || null, source: p };
  }
  return null;
}

const STRICT_POLICY_ADHERENCE = `STRICT ADHERENCE RULES:
- When matched policy gives numbered steps, follow them exactly.
- Don't invent tools, amounts, or timeframes not in the policy.
- If policy says "no compensation", state that plainly.
- If nothing matched, say so — never present a guess as policy.`;

const NEVER_ASK_RULES = `WHAT NEVER TO ASK THE CUSTOMER:
- NEVER ask for the "badge" (grey/red/gold). Badges are internal-only classifications and MUST NEVER be mentioned or requested.
- NEVER ask for the order number unless case-facts explicitly say the chat is unlinked, or the user (agent) asks you to.
  The agent has the order info already; asking for it insults the customer.
- NEVER ask for basic details already implied by the conversation (name, address, order type) unless truly missing.`;

const EMPATHY_PLAYBOOK = `CSAT & EMPATHY PLAYBOOK:
- Use the customer's name naturally 1-2 times (opening + reassurance/closing). Don't force it.
- For upset customers with no resolution available:
  1) Acknowledge the specific frustration ("I completely understand why this feels frustrating…").
  2) Validate without over-apologizing ("You're absolutely right to expect better.").
  3) Own the outcome ("I've made sure this is logged/flagged so it doesn't happen again.").
  4) Clearly explain what CAN be done and what CAN'T, without softening rules to false hope.
  5) Close warmly and personally.
- Match the customer's energy: brief with brief, warm with warm, calm with anxious.
- Read like a real person, not a script. Concrete, human, not generic.
- Read subtext: a "where's my order?" is really "am I forgotten?" — address the feeling too, not just the fact.`;

function buildPersonaInstructions(party = state.activeParty) {
  const audience = partyAudienceNoun(party);
  const geoLine = `Geographic scope: You handle ${activeCountryOptions().map(c => c.label).join(" and ")} ONLY. Ignore and do not cite policies specific to disabled regions.`;
  const base = `You are helping Mohammad, a Deliveroo customer service agent, in the ${partyLabel(party)} section. Communicate like a top-tier CSAT-winning agent with a psychologist's read on people. Warm, human, specific — never robotic, never generic. Firm where policy requires holding a line, but always respectful. In Arabic, write natural, professional Modern Standard Arabic (not literal machine translation, not slang). Match the customer's language.

${geoLine}`;

  const partnerNote = party === "partner"
    ? `\n\nContext: PARTNERS ARE MOSTLY HANDLED VIA PHONE. Assume spoken register unless the agent says otherwise: short natural sentences that read out loud well, no markdown, no bullets, no email openings/closings.`
    : "";

  const mediumNote = party === "calls"
    ? `\n\nMEDIUM: LIVE PHONE CALL. Give short spoken sentences. No bullets. No "[bracket]" placeholders — either ask the agent for the missing detail or phrase it naturally ("your order").`
    : party === "partner"
    ? ""
    : `\n\nMEDIUM: LIVE CHAT. No email subject/openers/closings. No "Best regards". Conversational chat length.`;

  const identityNote = `\n\nWhen natural, mention "Mohammad" and/or "Deliveroo" (in openings/wrap-ups). Don't force it into every reply.`;
  const styleNote = `\n\nSTYLE:
- No em/en dashes (— or –) — they read as AI. Use periods, commas, or "and".
- No stock openers like "I understand your frustration" as a reflex.
- Don't pad. Be exactly as long as the situation warrants and no more.
- Be human. A real person wrote this.`;

  return base + partnerNote + mediumNote + identityNote + styleNote + `\n\n${NEVER_ASK_RULES}\n\n${EMPATHY_PLAYBOOK}`;
}

function sanitizeAiText(text) {
  if (!text) return text;
  return text.replace(/\s*[—–]\s*/g, ", ").replace(/,\s*,+/g, ",").replace(/,\s*\./g, ".").replace(/,\s*\n/g, "\n");
}

function badgeNoteFor(badge) {
  return {
    grey: "Internal badge: GREY (default, most customers). Standard policy, standard tone. NEVER mention 'badge' or 'grey' to the customer.",
    red: "Internal badge: RED (flagged history). Apply policy strictly and minimally. No discretionary goodwill beyond policy. Stay professional, firm, not cold. NEVER mention the badge to the customer.",
    gold: "Internal badge: GOLD ⭐/⭐⭐ (high-value customer). Lean toward the more generous end of what policy allows. Prioritize retention and warmth. NEVER mention the badge to the customer."

}

function looksLikeCustomerMessage(text) {
  const t = (text || "").trim();
  if (!t) return false;
  // Common customer-message signals
  return /\b(where'?s my order|my order|didn'?t receive|hasn'?t arriv|refund|cancel|late|missing|wrong|complaint|why|when|help)\b/i.test(t)
      || /^(hi|hello|hey|salam|مرحبا|السلام)/i.test(t)
      || /\?$/.test(t.trim());
}

async function aiScanMatches() {
  const msg = document.getElementById("ai-scan-input").value.trim();
  const box = document.getElementById("ai-scan-results");
  if (!msg) return;
  if (!aiReady()) {
    const all = flattenMacros();
    const kw = msg.toLowerCase().split(/\s+/);
    const scored = all.map(m => ({ m, score: kw.reduce((s, w) => s + ((m.node.label + " " + m.node.text).toLowerCase().includes(w) ? 1 : 0), 0) })).filter(x => x.score > 0).sort((a,b) => b.score - a.score).slice(0, 3);
    box.innerHTML = scored.length ? scored.map(x => suggestionHtml(x.m)).join('') : '<p style="color:var(--muted); font-size:12px; margin-top:8px">No matches (set up AI backend for smarter matching).</p>';
    return;
  }
  const btn = document.getElementById("ai-scan-btn");
  btn.disabled = true;
  box.innerHTML = `<div class="progress-inline"><div class="spinner"></div>Retrieving policies…</div>`;
  const macros = flattenMacros();
  const list = macros.map((m, i) => `${i}: [${m.path.join(' › ')}] ${m.node.label} — ${m.node.text.slice(0,80)}`).join('\n');
  const polCtx = await policyContextFor(msg);
  box.innerHTML = `<div class="progress-inline"><div class="spinner"></div>Scanning macros…</div>`;
  const prompt = `Relevant policy:\n${polCtx}\n\nAvailable macros:\n${list}\n\nCustomer message: "${msg}"\n\nReturn the 3 best macro indices as JSON array only, e.g. [0,3,7]`;
  const result = await aiGenerate(prompt, null, /*fast=*/true);
  btn.disabled = false;
  try {
    const idxs = JSON.parse((result || "[]").replace(/```json|```/g, '').trim());
    const picks = idxs.map(i => macros[i]).filter(Boolean);
    box.innerHTML = picks.map(m => suggestionHtml(m)).join('') || '<p style="color:var(--muted); font-size:12px">No matches.</p>';
  } catch (e) { box.innerHTML = '<p style="color:var(--danger); font-size:12px">AI parse error — try again.</p>'; }
}

async function aiDraftReply() {
  const msg = document.getElementById("ai-scan-input").value.trim();
  const box = document.getElementById("ai-scan-results");
  if (!msg) return;
  if (!aiReady()) { aiNotReadyToast(); return; }
  const btn = document.getElementById("ai-draft-btn");
  btn.disabled = true;
  box.innerHTML = `<div class="suggestion"><div class="path">AI Drafted Reply <span class="progress-inline" style="margin-left:6px"><span class="spinner"></span><span id="draft-phase">Retrieving policies…</span></span></div><div id="ai-scan-stream" style="white-space:pre-wrap; margin-top:6px">…</div></div>`;
  const streamEl = document.getElementById("ai-scan-stream");
  const phaseEl = document.getElementById("draft-phase");
  const polCtx = await policyContextFor(msg);
  const macCtx = await macroContextFor(msg);
  if (phaseEl) phaseEl.textContent = "Drafting reply…";
  const updateStream = (text) => { if (streamEl) streamEl.textContent = text; };
  const isCustomerMsg = looksLikeCustomerMessage(msg);
  const prompt = `${buildPersonaInstructions()}\n\n${badgeNoteFor(currentBadge)}\n\nRelevant policy:\n${polCtx}\n\nRelevant saved macros (adapt when close-fitting, otherwise draft fresh):\n${macCtx}\n\n${STRICT_POLICY_ADHERENCE}\n\n${isCustomerMsg ? "The following looks like a CUSTOMER MESSAGE received by the agent. Assume the agent is asking you to write the reply. Do NOT ask clarifying questions unless truly critical — write the best reply now." : ""}\n\nCustomer message: "${msg}"\n\nWrite ONE best reply in the customer's language. Use [brackets] for placeholders only when the value is genuinely unknown. Return only the reply.`;
  const reply = await aiGenerate(prompt, updateStream);
  btn.disabled = false;
  if (!reply) { box.innerHTML = '<p style="color:var(--danger); font-size:12px">Drafting failed.</p>'; return; }
  const safe = escapeHtml(reply).replace(/\n/g, '<br>');
  box.innerHTML = `
    <div class="suggestion">
      <div class="path">AI Drafted Reply</div>
      <div>${safe}</div>
      <div class="actions">
        <button class="btn sm" onclick="navigator.clipboard.writeText(${JSON.stringify(reply)}); toast('Copied','success')">📋 Copy</button>
        <button class="btn sm primary" onclick='saveAiReplyToMacros(${JSON.stringify(reply)})'>+ Add to Macros</button>
      </div>
      ${sourcesHtml(policySourcesFor(msg))}
      ${toneButtonsHtml(reply, null)}
    </div>`;
}

function saveAiReplyToMacros(text) { openNodeModal({ parentId: null, forcedType: "macro", prefillText: text, prefillLabel: "" }); }

function flattenMacros(lang = state.lang, party = state.activeParty) {
  const out = [];
  const walk = (nodes, path) => nodes.forEach(n => {
    if (n.type === "macro") out.push({ node: n, path });
    walk(n.children || [], [...path, n.label]);
  });
  walk(state.trees[party][lang], []);
  return out;
}

function suggestionHtml(m) {
  return `<div class="suggestion">
    <div class="path" style="cursor:pointer" onclick="openNodeInTree('${m.node.id}')">${escapeHtml(m.path.join(' › '))}</div>
    <b style="cursor:pointer" onclick="openNodeInTree('${m.node.id}')">${escapeHtml(m.node.label)}</b>
    <div style="color:var(--muted); font-size:12px; margin-top:4px; cursor:pointer" onclick="openNodeInTree('${m.node.id}')">${escapeHtml((m.node.text || '').slice(0, 120))}${(m.node.text||'').length>120?'…':''}</div>
    ${toneButtonsHtml(m.node.text || '', m.node.id)}
  </div>`;
}

function appendStreamingBubble(phaseLabel = "Thinking…") {
  const log = document.getElementById("assistant-log");
