let assistantInFlight = false;
async function sendAssistantMessage() {
  if (assistantInFlight) { toast("Wait — still processing your last message"); return; }
  const chat = getActiveAssistantChat();
  if (!chat) return;
  const input = document.getElementById("assistant-input");
  const msg = (input.value || "").trim();
  if (!msg) return;
  if (!aiReady()) { aiNotReadyToast(); return; }
  const sendBtn = document.getElementById("assistant-send");
  assistantInFlight = true;
  sendBtn.disabled = true;
  sendBtn.textContent = "…";
  chat.messages.push({ role:"user", content: msg });
  input.value = "";
  localStorage.removeItem(DRAFT_STORAGE_PREFIX + chat.id);
  save(); renderAssistantChat();
  const bubble = appendStreamingBubble("Retrieving policies…");
  const sys = await buildAssistantSystemPrompt(msg, chat.party, chat.badge, chat.caseContext);
  bubble.setPhase("Thinking…");
  const messages = [{ role:"system", content: sys }, ...chat.messages.slice(-10).map(m => ({ role: m.role, content: m.content }))];
  const reply = await aiChat(messages, bubble.update);
  bubble.remove();
  assistantInFlight = false;
  sendBtn.disabled = false;
  sendBtn.textContent = "Send";
  if (reply) {
    const sources = policySourcesFor(msg, chat.party, chat.caseContext, chat.badge);
    chat.messages.push({ role:"assistant", content: reply.trim(), sources: sources.map(s => ({ id: s.id, title: s.title, policyCode: s.policyCode, path: s.path, leafType: s.leafType })) });
    save();
  }
  renderAssistantChat();
}

async function generateContactPacket() {
  const chat = getActiveAssistantChat();
  const box = document.getElementById("contact-packet-results");
  if (!chat || !chat.messages.length) { toast("Chat about the case first."); return; }
  if (!aiReady()) { aiNotReadyToast(); return; }
  box.innerHTML = '<div class="progress-inline"><div class="spinner"></div>Generating from policy DB…</div>';
  const transcript = chat.messages.map(m => `${m.role === "user" ? "Agent" : "Assistant"}: ${m.content}`).join("\n");
  // First: try DB lookup for contact reason / tag
  const dbMatch = findMatchingCategoryFromPolicies(transcript, chat.party);

  const sys = await buildAssistantSystemPrompt(transcript, chat.party, chat.badge, chat.caseContext);
  const prompt = `${sys}\n\nBased on the conversation, produce STRICT JSON (no fences, no prose) with exactly this shape:\n{"note":"2-4 sentence professional internal log: what happened and how it was resolved"}\n\nConversation:\n${transcript}`;
  const out = await aiGenerate(prompt);
  if (!out) { box.innerHTML = '<p style="color:var(--danger); font-size:12px">Failed.</p>'; return; }
  let note = "";
  try { note = (JSON.parse(out.replace(/```json|```/g, "").trim()).note || "").trim(); } catch { note = out.trim(); }

  const contactReason = dbMatch?.contactReason || null;
  const tag = dbMatch?.tag || null;
  const sourceInfo = dbMatch?.source ? ` <span class="badge">from ${escapeHtml(dbMatch.source.article || "policy DB")}</span>` : "";

  box.innerHTML = ["contactReason","note","tag"].map(key => {
    const val = key === "contactReason" ? contactReason : key === "tag" ? tag : note;
    const label = key === "contactReason" ? "Contact Reason" : key === "tag" ? "Tag / Hashtag" : "Note (log)";
    const hint = (key === "contactReason" || key === "tag") && !val ? '<span class="packet-value empty-note">No matching entry in policy DB — left blank on purpose.</span>' : `<div class="packet-value">${escapeHtml(val || "")}</div>`;
    return `
      <div class="packet-field">
        <div style="flex:1">
          <label>${label}${key !== "note" ? sourceInfo : ""}</label>
          ${hint}
        </div>
        ${val ? `<button class="btn sm" onclick="navigator.clipboard.writeText(${JSON.stringify(val)}); toast('Copied','success')">📋</button>` : ""}
      </div>`;
  }).join("");
}

// Request queue — one AI call at a time, with abort
let aiQueue = Promise.resolve();
let currentAbort = null;
function queueAiCall(fn) {
  const run = aiQueue.then(fn, fn);
  aiQueue = run.then(() => {}, () => {});
  return run;
}
function abortInFlightAI() { if (currentAbort) { try { currentAbort.abort(); } catch (e) {} currentAbort = null; } }

async function aiGenerate(prompt, onToken, fast = false) { return aiChat([{ role:"user", content: prompt }], onToken, fast); }

async function aiChat(messages, onToken, fast = false) {
  const backendFn = state.aiBackend === "gemini" ? aiChatGemini : aiChatOpenRouter;
  const wrappedOnToken = onToken ? (text) => onToken(sanitizeAiText(text)) : undefined;
  const out = await queueAiCall(() => backendFn(messages, wrappedOnToken, fast));
  return out ? sanitizeAiText(out) : out;
}

let lastGeminiCallAt = 0;
const GEMINI_MIN_GAP_MS = 6500;

async function aiChatGemini(messages, onToken, fast) {
  if (!GEMINI_API_KEY) { toast("No Gemini key set", "error"); return null; }
  const waitFor = GEMINI_MIN_GAP_MS - (Date.now() - lastGeminiCallAt);
  if (waitFor > 0) await new Promise(r => setTimeout(r, waitFor));
  lastGeminiCallAt = Date.now();
  const systemParts = messages.filter(m => m.role === "system").map(m => m.content);
  const contents = messages.filter(m => m.role !== "system").map(m => ({ role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] }));
  const body = { contents };
  if (systemParts.length) body.systemInstruction = { parts: [{ text: systemParts.join("\n\n") }] };
  const model = fast ? GEMINI_FAST_MODEL : GEMINI_MODEL;
  const abort = new AbortController(); currentAbort = abort;
  let res;
  try {
    res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse`, {
      method: "POST", headers: { "Content-Type":"application/json", "x-goog-api-key": GEMINI_API_KEY },
      body: JSON.stringify(body), signal: abort.signal
    });
  } catch (e) { toast("AI network error: " + (e.message || e), "error"); return null; }
  if (!res.ok) {
    let data = null; try { data = await res.json(); } catch(e) {}
    toast("AI error: " + (data?.error?.message || res.status), "error"); return null;
  }
  let text = "";
  try {
    const reader = res.body.getReader(); const decoder = new TextDecoder(); let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream:true });
      const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;
        try {
          const evt = JSON.parse(jsonStr);
          const piece = evt?.candidates?.[0]?.content?.parts?.[0]?.text;
          if (piece) { text += piece; if (onToken) onToken(text); }
        } catch(e) {}
      }
    }
  } catch (e) { if (!text) { toast("AI streaming error", "error"); return null; } }
  currentAbort = null;
  return text || null;
}

async function aiChatOpenRouter(messages, onToken, fast) {
  if (!OPENROUTER_API_KEY) { toast("No OpenRouter key set", "error"); return null; }
  const listStr = fast ? (state.openRouterFastModels || DEFAULT_OPENROUTER_FAST) : (state.openRouterModels || DEFAULT_OPENROUTER_MODELS);
  const modelsList = listStr.split(",").map(s => s.trim()).filter(Boolean);
  if (!modelsList.length) { toast("No models configured", "error"); return null; }
  const abort = new AbortController(); currentAbort = abort;
  let res;
  try {
    res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method:"POST", signal: abort.signal,
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + OPENROUTER_API_KEY, "HTTP-Referer": location.origin, "X-Title":"Mohammad Macro Playbook" },
      body: JSON.stringify({ models: modelsList, messages, stream: true })
    });
  } catch (e) { toast("Network error: " + (e.message || e), "error"); return null; }
  if (!res.ok) {
    let data = null; try { data = await res.json(); } catch(e){}
    const msg = data?.error?.message || ("HTTP " + res.status);
    if (res.status === 401) toast("Invalid OpenRouter key", "error");
    else if (res.status === 402) toast("OpenRouter credits exhausted", "error");
    else if (res.status === 429) toast("All models rate-limited — try again shortly", "error");
    else toast("AI error: " + msg, "error");
    return null;
  }
  let text = ""; let modelUsed = null;
  try {
    const reader = res.body.getReader(); const decoder = new TextDecoder(); let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream:true });
      const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr || jsonStr === "[DONE]") continue;
        try {
          const evt = JSON.parse(jsonStr);
          if (evt.model) modelUsed = evt.model;
          const piece = evt?.choices?.[0]?.delta?.content;
          if (piece) { text += piece; if (onToken) onToken(text); }
        } catch(e) {}
      }
    }
  } catch (e) { if (!text) { toast("Streaming error", "error"); return null; } }
  currentAbort = null;
  if (!text) { toast("Empty response — try again", "error"); return null; }
  lastOpenRouterModelUsed = modelUsed;
  const statusEl = document.getElementById("openrouter-last-model");
  if (statusEl && modelUsed) statusEl.textContent = "Last answered by: " + modelUsed;
  return text;
}

function getVisibleNodeList() {
  const query = document.getElementById("search").value.trim().toLowerCase();
  if (query) return computeSearchResults(query).map(r => r.node);
  const list = [];
  const walk = (nodes) => nodes.forEach(n => {
    list.push(n);
    const hasChildren = !!(n.children && n.children.length);
    const isTitle = n.type === "title";
    const isExpanded = !hasChildren || !isTitle || sessionExpanded.has(n.id);
    if (hasChildren && isExpanded) walk(n.children);
  });
  walk(currentTree());
  return list;
}

function moveKeyboardFocus(direction) {
  const list = getVisibleNodeList();
  if (!list.length) return;
  let idx = list.findIndex(n => n.id === kbdFocusId);
  if (idx === -1) idx = list.findIndex(n => n.id === state.activeId);
  if (idx === -1) idx = direction > 0 ? -1 : list.length;
  idx = Math.max(0, Math.min(list.length - 1, idx + direction));
  const node = list[idx];
  kbdFocusId = node.id;
  if (node.type === "macro") state.activeId = node.id;
  pendingScrollToId = node.id;
  render();
}
function activateKeyboardFocus() {
  if (!kbdFocusId) return;
  const f = findNode(kbdFocusId); if (!f) return;
  const hasChildren = !!(f.node.children && f.node.children.length);
  if (hasChildren && f.node.type === "title") toggleFolderExpanded(kbdFocusId, /*autoClose=*/true);
  else { state.activeId = kbdFocusId; pendingScrollToId = kbdFocusId; render(); }
}

document.addEventListener("keydown", (e) => {
  // Shortcuts (Shift+Alt+key) — copy macro
  if (e.shiftKey && e.altKey && !e.ctrlKey && !e.metaKey && e.key.length === 1) {
    const combo = `Shift+Alt+${e.key.toUpperCase()}`;
    const macroId = state.shortcuts && state.shortcuts[combo];
    if (macroId) {
      e.preventDefault();
      copyMacroById(macroId);
      return;
    }
  }
  if (e.key !== "ArrowDown" && e.key !== "ArrowUp" && e.key !== "Enter") return;
  if (document.querySelector(".modal-backdrop")) return;
  const ae = document.activeElement;
  const tag = ae && ae.tagName;
  const isSearchBox = ae && ae.id === "search";
  const isTextish = ae && (tag === "TEXTAREA" || ae.isContentEditable || (tag === "INPUT" && !isSearchBox));
  if (isTextish) return;
  if (e.key === "ArrowDown") { e.preventDefault(); moveKeyboardFocus(1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); moveKeyboardFocus(-1); }
  else if (e.key === "Enter") { e.preventDefault(); activateKeyboardFocus(); }
});

function copyMacroById(id) {
  const any = findNodeInAnyParty(id);
  if (!any || any.node.type !== "macro") { toast("Macro no longer exists", "error"); return; }
  const text = any.node.text || "";
  // Strip empty [brackets] for shortcut copy — user is on the fly
  navigator.clipboard.writeText(text);
  toast(`Copied: ${any.node.label}`, "success");
}

/* ============================================================
   EVENTS
   ============================================================ */
document.querySelectorAll("#lang-toggle button").forEach(b => {
  b.addEventListener("click", () => { state.lang = b.dataset.lang; state.activeId = null; render(); });
});
document.getElementById("search").addEventListener("input", renderTree);

// Bootstrap
(async () => {
  await bootstrapPolicies();
  render();
})();
</script>
